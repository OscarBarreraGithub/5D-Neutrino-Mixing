  status: "NO"
  evidence: []
  required_grep_commands:
    - command: "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
      result_summary: "Only existing Delta F = 2 neutral-meson and mu->e gamma surfaces; no K+ -> pi+ nu nubar implementation."
    - command: "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
      result_summary: "Hits are catalog plan text, generic neutrino utilities, and unrelated flavor surfaces; no live charged rare-kaon branching-ratio constraint."
    - command: "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests docs -g '!*.ipynb'"
      result_summary: "Modern and legacy quark surfaces enumerate epsilon_K, K, B_d, B_s, and D0 Delta F = 2 systems only."
    - command: "rg -n \"K\\^?\\+.*pi\\^?\\+.*nu|K\\+.*pi\\+.*nu|pi\\+.*nu.*nu|pi.*nu.*nubar|Kp.*Pip|K.*pi.*nubar|NA62|KOTO\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
      result_summary: "Specific rare-kaon search returns only catalog planning documents, not implementation files."
  near_miss_evidence:
    - "quarkConstraints/modern/phenomenology.py:23 enumerates only epsilon_K, K, B_d, B_s, D0."
    - "quarkConstraints/deltaf2.py:211 defines epsilon_K, not K+ -> pi+ nu nubar."
    - "quarkConstraints/deltaf2.py:755 defines Delta m_K helper, not a Delta F = 1 semileptonic decay."
implementation_difficulty: "MEDIUM"
implementation_difficulty_reason: "Requires a new Delta F = 1 semileptonic s -> d nu nubar operator basis and branching-ratio formula with SM--NP interference, but uses standard clean hadronic input."
