theory_decomposition:
  source_type: "paper_era_reference; not a pdg_or_equivalent measured observable"
  source: "Isidori, Smith, Unterdorfer, Eur. Phys. J. C 36 (2004) 57"
  year: 2004
  source_url: "https://arxiv.org/abs/hep-ph/0404127"
  access_date: "2026-05-16"
  snapshot_path: "flavor_catalog/references/K008/isidori_smith_unterdorfer2004_kl_pi0ll_arxiv.txt"
  sha256: "4cf0225eda40d1b4e9bbecf3f3099c930713441cbc62a20c3965d1002f14bece"
