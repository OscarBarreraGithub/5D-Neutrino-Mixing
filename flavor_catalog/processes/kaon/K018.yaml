code_coverage:
  status: "PARTIAL"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  evidence:
    - "quarkConstraints/scan.py:43 documents PDG-derived global-fit averages including |V_us|."
    - "quarkConstraints/scan.py:247 labels the reduced CKM observable set as Vus, Vcb, Vub, J."
    - "tests/test_quark_fit.py:587 anchors the |V_us| target convention against PDG 2024."
  missing:
    - "No K_l3, K_e3, K_mu3, |V_us| f_+(0), f_+(0), radiative/isospin correction, or semileptonic-kaon likelihood implementation was found."
    - "quarkConstraints/modern/phenomenology.py:23 limits the modern phenomenology systems to epsilon_K, K, B_d, B_s, and D0."
  grep_commands:
    - command: "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
      result_summary: "Finds Delta F = 2 neutral-meson and mu->e gamma surfaces only."
    - command: "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
      result_summary: "No K_l3 implementation; hits are unrelated Delta F = 2, LFV, QCD, and benchmark surfaces."
    - command: "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
      result_summary: "Confirms implemented/policy surfaces are neutral-meson Delta F = 2 systems plus mu->e gamma."
    - command: "rg -n \"K.?l3|K_l3|Kell3|Ke3|Kmu3|K.?->.?pi.?e.?nu|K.?->.?pi.?mu.?nu|Vus.*f|f_\\\\+\\\\(0\\\\)|semileptonic kaon|Cabibbo|V_us|Vus\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
      result_summary: "Finds only generic CKM |V_us| fit targets and tests, not K_l3 source observables."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "A live K018 constraint requires a new charged-current semileptonic observable or EW002 sub-likelihood, radiative/isospin and phase-space conventions, lattice f_+(0) provenance, and BSM charged-current matching. Existing Delta F = 2 operators do not cover it."
open_issues:
  - "WA/CA should decide whether K018 remains PARTIAL because generic |V_us| exists in the quark fit, or is downgraded to NO for missing source-level K_l3 rates."
  - "If promoted to live code, PI must choose whether K018 is represented as an independent K_l3 likelihood or only as an input block to EW002 CKM unitarity."
