  required_grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
    - "rg -n \"Delta[ _-]?A_?CP|DeltaA_CP|\\\\bA_CP\\\\b|ACP\\\\(|a_CP|A\\\\{CP\\\\}|direct CP|CP asym|D0.*K\\\\+K|D0.*pi\\\\+pi|charm CP|c.?->.?u|c.?to.?u\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"direct.?cp|delta.?a.?cp|a.?cp.*kk|a.?cp.*pi|charm.?cp|D0.*K.*K|D0.*pi.*pi\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -i -g '!*.ipynb'"
  evidence:
    - "No direct charm CP-asymmetry implementation was found by focused grep across the required implementation directories."
    - "Focused direct-CP grep matched only unrelated neutrino delta_CP symbols at neutrinos/neutrinoValues.py:65-66 and broad neutral-D mixing symbols, not C003."
    - "quarkConstraints/deltaf2.py:941 implements evaluate_d0_mixing for Delta F = 2 neutral-D mixing, not Delta A_CP."
    - "quarkConstraints/modern/phenomenology.py:46 labels D0 as conservative_non_cp_mixing_amplitude_hadronic."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "A production constraint would need new Delta C = 1 operator matching, RG treatment for four-quark and chromomagnetic operators, and a nonleptonic charm hadronic-amplitude or likelihood prescription; the current Delta F = 2 machinery does not cover this observable."
open_issues:
  - "WA/CA should decide whether to headline HFLAV Delta a_CP^dir or the directly measured Delta A_CP input. This PKA uses HFLAV Delta a_CP^dir as the canonical equivalent value and records the LHCb/HFLAV Delta A_CP input as the discovery anchor."
