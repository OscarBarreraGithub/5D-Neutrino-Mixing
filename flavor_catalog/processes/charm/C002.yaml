code_coverage:
  status: "PARTIAL"
  required_grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
    - "rg -n \"q/p|q_over_p|qoverp|phi_D|phiD|Arg\\\\(q/p\\\\)|indirect CP|CPV|CP violation|D0.*CP|D mixing.*CP|imaginary|Im\\\\(|M12|Gamma12\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "quarkConstraints/deltaf2.py:252 defines the legacy D-mixing DeltaF2Input."
    - "quarkConstraints/deltaf2.py:941 defines evaluate_d0_mixing."
    - "quarkConstraints/deltaf2.py:948-955 reduces D0 mixing to abs(M12_NP), a budget ratio, and a pass/fail flag."
    - "quarkConstraints/scan.py:103 exports d_mix_ratio, not a CPV observable."
    - "quarkConstraints/scan.py:439 records d_mix_ratio from the D-system DeltaF2 result."
    - "quarkConstraints/modern/phenomenology.py:46 classifies D0 as conservative_non_cp_mixing_amplitude_hadronic."
    - "quarkConstraints/modern/phenomenology.py:668 defines _evaluate_d0_mixing_from_bridge."
    - "quarkConstraints/paper_0710_1869/eft_deltaf2/observables.py:1300 stores complex M12_D0_NP_GeV in a paper-mode D0 observable result."
    - "quarkConstraints/paper_0710_1869/eft_deltaf2/observables.py:1403 exposes im_M12_D0_NP_GeV."
    - "quarkConstraints/paper_0710_1869/eft_deltaf2/observables.py:1440-1445 serializes M12_D0_NP_GeV, re_M12_D0_NP_GeV, and im_M12_D0_NP_GeV."
    - "No exported scan or modern-phenomenology path was found for HFLAV |q/p| or phi_D."
implementation_difficulty: "LOW"
implementation_difficulty_reason: "The existing Delta F = 2 operator basis and D0 M12 machinery cover the relevant short-distance amplitude; implementation would need a CPV observable wrapper or conservative HFLAV likelihood policy, not a new operator or RG calculation."
open_issues:
  - "WA/CA should decide whether C002 should remain a qualitative CPV diagnostic or carry a production likelihood using the HFLAV |q/p|-phi_D contour/covariance."
