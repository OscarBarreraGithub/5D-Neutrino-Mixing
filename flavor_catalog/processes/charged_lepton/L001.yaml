code_coverage:
  status: "YES"
  searched_paths:
    - "quarkConstraints"
    - "qcd"
    - "flavorConstraints"
    - "neutrinos"
    - "yukawa"
    - "warpConfig"
    - "solvers"
    - "scanParams"
    - "tests"
  auxiliary_search_paths:
    - "docs"
    - "scripts"
  required_grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests docs -g '!*.ipynb'"
  targeted_grep_commands:
    - "rg -n \"mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG|check_mu_to_e_gamma|PREFAC_BR|BR_LIMIT_MEGII_2025|br_limit\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "flavorConstraints/muToEGamma.py:1 documents the mu->e gamma lepton-flavor-violation constraint."
    - "flavorConstraints/muToEGamma.py:20 records the Perez-Randall paper-era coefficient C = 0.02."
    - "flavorConstraints/muToEGamma.py:31 defines PREFAC_BR = 4.0e-8."
    - "flavorConstraints/muToEGamma.py:61 defines coefficient_from_br_limit(br_limit, prefactor=PREFAC_BR)."
    - "flavorConstraints/muToEGamma.py:75 defines check_mu_to_e_gamma."
    - "flavorConstraints/muToEGamma.py:136 applies the C x (M_KK / reference_scale)^2 RHS scaling in the live code."
    - "scanParams/scan.py:32 records the published MEG II 2025 bound BR(mu -> e gamma) < 1.5e-13."
    - "scanParams/scan.py:33 defines BR_LIMIT_MEGII_2025 = 1.5e-13."
    - "scanParams/scan.py:264 makes BR_LIMIT_MEGII_2025 the default ScanConfig.br_limit."
    - "tests/test_mu_to_e_gamma.py:40 tests that the MEG II 2025 limit tightens C relative to C_PAPER."
    - "tests/test_scan.py:50 tests that default scan LFV settings match the documented MEG II 2025 limit."
implementation_difficulty: "LOW"
implementation_difficulty_reason: "The process already has a live LFV dipole/NDA implementation and scan default. Cataloging only requires source tracking and documenting the difference between the paper-era coefficient and the MEG II 2025 scan default."
implementation_difficulty_if_missing: "MEDIUM"
implementation_difficulty_if_missing_reason: "A fresh implementation would require a new lepton-dipole observable and RS lepton-spurion matching, but not new hadronic matrix elements or QCD running."
open_issues:
  - "PDG 2025 listing snapshot records <3.1e-13, while the newer published MEG II 2025 primary paper gives <1.5e-13; WA/CA should confirm how to display this lag."
  - "The live code's mass-scaling convention is explicit and tested, but the paper-era Perez-Randall source text should be rechecked before any future paper-quality derivation of the NDA formula."
