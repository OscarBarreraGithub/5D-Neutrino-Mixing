code_coverage:
  status: "NO"
  evidence:
    - "quarkConstraints/modern/phenomenology.py:23 lists only epsilon_K, K, B_d, B_s, and D0 as modern phenomenology systems."
    - "flavorConstraints/muToEGamma.py:75 implements check_mu_to_e_gamma; it is a lepton dipole constraint, not b -> s l+l-."
    - "Targeted code-only search for Lambda_b, Lambda mu, b->s, C9, C10, and semileptonic returned no B021 backend; only Lambda_IR false positives appeared."
  commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests docs -g '!*.ipynb'"
    - "rg -n -e 'Lambda_b' -e 'Lambda.*mu' -e 'b.?->.?s' -e 'C9' -e 'C10' -e 'semileptonic' quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd solvers tests -g '!*.ipynb'"
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_notes: "Requires a new Delta B = 1 semileptonic Hamiltonian, matching to C7/C9/C10 and primed operators, Lambda_b -> Lambda baryonic form factors, q2-bin handling, angular-observable likelihoods, and normalization/covariance treatment."
open_issues:
  - "PDG lists many q2-binned partial branching fractions; this PKA draft records the total BF plus the LHCb high-q2 differential/angular values most directly needed for process identification."
  - "No electron-mode Lambda_b0 -> Lambda e+e- canonical measurement was found in PDG Live; checker should confirm whether B021 should remain muon-mode-only for current measured values."
