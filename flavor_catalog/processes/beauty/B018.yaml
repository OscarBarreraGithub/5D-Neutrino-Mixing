implementation_notes: "Requires a new Delta B = 1 semileptonic weak Hamiltonian, lepton-flavor-dependent C9/C10 and primed coefficients, bin-aware SM/QED predictions, and experimental likelihood/correlation handling."
open_issues:
  - "HFLAV Dec. 2025 direct pages are accessible for the R_K bins, but the public rare-decay landing page still advertises older navigation. Checker should confirm Dec. 2025 publication status if strict HFLAV release labeling matters."
  - "The sidecar records the central HFLAV average and inputs, but does not attempt a global b -> s ll fit or covariance reconstruction."
