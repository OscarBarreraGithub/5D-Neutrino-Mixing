code_coverage:
  status: "NO"
  grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"B_s.*phi|Bs.*phi|phi.?phi|phi_s\\\\^|phis|sbar.?s|b.?->.?s.?s|penguin|time.?dependent CP|charmless|polarisation|polarization\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "Focused B034 grep returned no direct B_s -> phi phi, b -> s sbar s penguin, time-dependent charmless CP, or angular-likelihood implementation in the required directories."
    - "quarkConstraints/deltaf2.py:239 defines the existing b_s Delta F=2 input key for B_s mixing."
    - "quarkConstraints/deltaf2.py:651 stores the experimental Delta m_Bs input used by the B_s mixing magnitude constraint."
    - "quarkConstraints/deltaf2.py:922 defines evaluate_bs_mixing; line 929 reduces the computed M12 to abs(m12), so it does not expose the penguin phase observable."
    - "quarkConstraints/modern/phenomenology.py:23 lists epsilon_K, K, B_d, B_s, and D0 as modern phenomenology systems."
    - "quarkConstraints/modern/phenomenology.py:657 defines the modern B_s mixing bridge, also as a mixing-magnitude evaluator."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires a new Delta B = 1 nonleptonic b -> s sbar s operator and amplitude/likelihood treatment. Existing Delta F = 2 SLL/SLR/VLL/VRR/LR1/LR2 neutral-meson machinery covers B_s mixing magnitudes but not B_s -> phi phi decay amplitudes, polarization-dependent angular observables, or strong-phase model dependence."
open_issues:
  - "WA/CA should decide whether to headline the PDG beta_s convention or the LHCb phi_s^{s sbar s} convention; this draft uses phi_s as the standard notation and records beta_s explicitly."
  - "A future implementation needs a PI-approved nonleptonic Delta B = 1 framework before this can become a hard scan constraint."
