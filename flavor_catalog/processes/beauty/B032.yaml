code_coverage:
  status: "NO"
  grep_commands:
    - "rg -n \"B032|B.?->.?K.?pi|B.?to.?K.?pi|B.?->.?pi.?K|B.?to.?pi.?K|BtoKpi|Kpi_puzzle|Kpi|K_pi|pi_K|charmless|nonleptonic|electroweak.?penguin\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|b.?to.?s|B_s|B_d|epsilon_K|epsilon_k|Delta m_K|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS_V1|evaluate_bd_mixing|evaluate_bs_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
  evidence:
    - "Focused B032/B->Kpi/charmless/nonleptonic/electroweak-penguin grep across implementation and test directories returned exit=1."
    - "quarkConstraints/modern/phenomenology.py:23 enumerates only epsilon_K, K, B_d, B_s, and D0 in the modern policy surface."
    - "quarkConstraints/modern/phenomenology.py:165 says the modern surface is policy-only and has no numeric EFT backend."
    - "quarkConstraints/deltaf2.py:209 begins the default Delta F = 2 input tuple for epsilon_K, B_d, B_s, and D mixing only."
    - "flavorConstraints/muToEGamma.py:75 implements the lepton mu->e gamma dipole check, not a quark nonleptonic penguin observable."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires a new nonleptonic b -> s qbar q amplitude/likelihood layer with electroweak-penguin matching, hadronic strong phases, and correlated four-mode treatment; the existing Delta F = 2 basis does not cover B -> pi K."
open_issues:
  - "WA/CA should decide whether to headline the HFLAV time-integrated A_CP(B0 -> K0 pi0) value or the PDG time-dependent C(K0 pi0) coefficient when describing direct CP for the neutral CP-eigenstate mode."
