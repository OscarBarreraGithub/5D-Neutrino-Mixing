code_coverage:
  status: "PARTIAL"
  grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"phi_s|phis|J/psi|Jpsi|psi.*phi|B_s.*phi|Bs.*phi|beta_s\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "Focused grep for phi_s/phis/Jpsi/J/psi/psi phi/B_s phi/beta_s returned no direct observable implementation in the required implementation/test directories."
    - "quarkConstraints/deltaf2.py:239 defines the existing b_s input key for B_s mixing."
    - "quarkConstraints/deltaf2.py:651 stores the experimental Delta m_Bs input used by the magnitude constraint."
    - "quarkConstraints/deltaf2.py:922 defines evaluate_bs_mixing; quarkConstraints/deltaf2.py:929 reduces computed M12 to abs(m12), so the phase is not exposed."
    - "quarkConstraints/modern/phenomenology.py:657 defines the modern bridge B_s mixing evaluator, also for a magnitude-style contribution."
    - "quarkConstraints/qcd_running.py:7 documents the Delta F=2 VLL/VRR/LR operator basis relevant for a future phase observable."
implementation_difficulty: "LOW"
implementation_difficulty_if_missing: "LOW"
implementation_notes: "Existing Delta F=2 Wilson, running, and hadronic machinery covers the operator basis. A live phi_s constraint needs complex M12_s retention, SM phase convention, HFLAV likelihood/tolerance policy, and a small penguin-systematics treatment."
open_issues:
  - "WA/CA should decide whether the prose should headline the HFLAV all-combined phi_s^ccs average (-0.041 +/- 0.016 rad) or the strict Bs0 -> J/psi K+K- combined average (-0.050 +/- 0.017 rad). This PKA uses the all-combined value as canonical and records the mode-specific value separately."
