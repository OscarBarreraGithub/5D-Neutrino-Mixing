code_coverage:
  status: "YES"
  coverage_id: "YES-D2-BS"
  grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "quarkConstraints/deltaf2.py:238 defines the DeltaF2Input block for B_s mixing."
    - "quarkConstraints/deltaf2.py:239 sets the backend key to b_s."
    - "quarkConstraints/deltaf2.py:244 sets the down-sector generations to (1, 2)."
    - "quarkConstraints/deltaf2.py:645 stores the B_s decay constant used by the hadronic evaluator."
    - "quarkConstraints/deltaf2.py:651 stores DELTA_M_BS_EXP."
    - "quarkConstraints/deltaf2.py:893 defines the B_s NP-budget helper."
    - "quarkConstraints/deltaf2.py:922 defines evaluate_bs_mixing."
    - "quarkConstraints/deltaf2.py:969 defines evaluate_bs_mixing_with_running."
    - "quarkConstraints/modern/phenomenology.py:23 includes B_s in the modern phenomenology system IDs."
    - "quarkConstraints/modern/phenomenology.py:135 defines the modern B_s policy entry."
    - "quarkConstraints/modern/phenomenology.py:657 defines the modern bridge B_s mixing evaluator."
    - "quarkConstraints/modern/phenomenology.py:1346 routes system_id == B_s to that evaluator."
    - "quarkConstraints/qcd_running.py:7 documents the Delta F=2 operator basis used by B_s."
implementation_difficulty: "LOW"
implementation_difficulty_if_missing: "LOW"
implementation_notes: "Existing Delta F=2 SLL/SLR/VLL/VRR/LR1/LR2 machinery and the modern bridge already cover B_s mixing. A future polish could refresh the numeric inputs and policy labels, but no new operator basis, RG evolution, or mode calculation is needed."
