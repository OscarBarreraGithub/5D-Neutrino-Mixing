code_coverage:
  status: "NO"
  evidence:
    - "Targeted regex search for B -> K* nu nubar, b -> s nu nubar, Kstar nu, nu_nubar, nunu, and invisible B returned no matches in the required code directories."
    - "quarkConstraints/modern/phenomenology.py:23 lists only epsilon_K, K, B_d, B_s, and D0 as modern phenomenology systems."
    - "quarkConstraints/deltaf2.py:209 defines the legacy Delta F = 2 input set."
    - "quarkConstraints/deltaf2.py:903 and quarkConstraints/deltaf2.py:922 implement B_d and B_s mixing, not Delta B = 1 invisible decays."
    - "flavorConstraints/muToEGamma.py:75 implements check_mu_to_e_gamma; no b -> s nu nubar routine is present."
  commands:
    - >-
      rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "b.?->.?s|X_s|K\\*|Kstar|K\\^\\*|nu.*nubar|nunu|invisible|B_s.*mu|pi.*nu|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "B\\s*(->|to).*K\\*.*nu|B0.*K\\*|B\\+.*K\\*|Kstar.*nu|K\\*.*nu|K\\^\\*.*nu|b\\s*(->|to)\\s*s\\s*nu|nubar|nu_nubar|nunu|invisible" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_notes: "Requires a new Delta B = 1 b -> s nu nubar operator basis, RS matching for neutral-current left/right coefficients, B -> K* form factors and polarization treatment, and an experimental upper-limit likelihood or validated CL reinterpretation."
open_issues:
  - "HFLAV/PDG provide upper limits, not a reusable likelihood; future integration should decide a conservative CL treatment."
  - "No Belle II B -> K* nu nubar update is present in the HFLAV Dec. 2025 table; checker should verify whether any preliminary Belle II vector-mode result exists outside HFLAV."
