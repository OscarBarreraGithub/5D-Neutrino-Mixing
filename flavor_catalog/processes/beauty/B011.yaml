  evidence:
    - "Focused implementation grep for X_s, b->s gamma, C7, and C8 in implementation/test directories returned exit=1."
    - "quarkConstraints/modern/phenomenology.py:23 enumerates only epsilon_K, K, B_d, B_s, and D0 in the modern quark policy surface."
    - "quarkConstraints/modern/phenomenology.py:165 says that surface is policy-only and does not define a numeric EFT backend."
    - "flavorConstraints/muToEGamma.py:1 is a lepton mu->e gamma dipole constraint, not a quark b->s gamma implementation."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "Requires a new b -> s gamma dipole observable with C7/C8 matching, QCD running, inclusive-rate normalization, SM subtraction/uncertainty treatment, and photon-energy-cut conventions not present in the audited Delta F=2 code."
open_issues:
  - "WA/CA should decide whether the canonical theory comparison should use the PDG-reviewed 2015 Misiak et al. NNLO number or the 2020 Misiak/Rehman/Steinhauser update as the headline SM prediction; this PKA records both and uses the 2020 update as current."
