    - "rg -n -F \"B+ --> tau\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"B\\\\+.*tau|B\\\\^\\\\+.*tau|tau.*nu|b.?->.?u|charged.?current|charged.?Higgs|leptoquark|W'|Wprime\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "Required broad greps found the existing Delta F=2 and mu->e gamma surfaces, but no B+ -> tau+ nu observable implementation."
    - "Targeted searches over quarkConstraints, qcd, flavorConstraints, neutrinos, yukawa, warpConfig, solvers, scanParams, and tests returned no B+ -> tau+ nu, b->u tau nu, charged-Higgs, Wprime, or leptoquark implementation hits."
    - "Auxiliary docs searches hit only the flavor-catalog planning rows: docs/phase_logs/flavor_catalog_plan_v1.md:271 and docs/phase_logs/flavor_catalog_plan_v0.md:241; those were not counted as code coverage."
implementation_difficulty: "MEDIUM"
implementation_difficulty_reason: "A live constraint would need a new charged-current leptonic-B observable and model matching to W'/charged-scalar/leptoquark-like amplitudes, but the experimental average and SM inputs are standard and no new QCD RG machinery is expected for the catalog-level formula."
open_issues:
  - "[RESOLVED-by-C08 2026-05-25] Canonical headline is the HFLAV End-of-December-2025 rare-B average 1.12e-4 in pdg_or_equivalent (B009.yaml:93-100), per the PKA's stated default; the PDG 2025 listing is retained as a supporting value. Rationale: HFLAV folds in the latest Belle II hadronic-tag input and CA Wave-1 cycle accepted this assignment when CHK-1..CHK-8 passed. Original note: Writer/checker should decide whether the final prose should use HFLAV Dec. 2025 or PDG 2025 as the display canonical value; this PKA sidecar records both and uses HFLAV as the canonical current average."
  - "[DEFERRED-to-post-paper-finalization 2026-05-25 (C08)] Direct f_B |V_ub| construction would require new FLAG snapshots; not required for the current operational_scan_only claim level (the UTfit SM prediction already covers the catalog use case). Revisit if B009 is ever promoted to a live constraint. Original note: If the catalog later wants a direct f_B |V_ub| construction rather than the UTfit SM prediction, it should add explicit FLAG f_B and |V_ub| snapshots."
