code_coverage:
  status: "NO"
  evidence:
    - "Targeted grep for B+ -> K+ nu nubar, B -> K nu, b -> s nu nubar, invisible modes, rare_decay, and WET-like CVL/CVR labels found no observable implementation in the required code directories; incidental hits were generic Delta F = 2 C_VLL/C_VRR tests and scan parameter names."
    - "quarkConstraints/modern/phenomenology.py:23 lists only epsilon_K, K, B_d, B_s, and D0 as modern phenomenology systems."
    - "quarkConstraints/modern/phenomenology.py:166 states that this surface is a policy-only fence and does not define a numeric EFT backend."
    - "quarkConstraints/deltaf2.py:209 defines the legacy Delta F = 2 input tuple."
    - "quarkConstraints/deltaf2.py:903 and quarkConstraints/deltaf2.py:922 implement B_d and B_s neutral-meson mixing, not Delta B = 1 rare invisible decays."
    - "flavorConstraints/muToEGamma.py:75 implements the separate mu -> e gamma dipole check; no b -> s nu nubar routine is present."
  commands:
    - >-
      rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'
    - >-
      rg -n "B\\+.*K\\+.*nu|B.?->.?K.?nu|K\\+.*nu.*nubar|nu.*nubar|invisible|C_L|C_R|CVL|CVR|C_VL|C_VR|b.?->.?s.*nu|b.?to.?s.*nu|rare_decay|rare decay" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "A live constraint needs a new Delta B = 1 b -> s nu nubar weak-Hamiltonian normalization, exclusive B -> K form-factor integration, neutrino/invisible final-state treatment, and likely Belle II likelihood or kinematic-reweighting support. The existing Delta F = 2 SLL/SLR/VLL/VRR/LR1/LR2 neutral-meson basis does not compute this mode."
open_issues:
  - "Checker should decide whether the headline prose should prefer the HFLAV Dec. 2025 average or the PDG live/Belle II evidence value, because HFLAV combines inferred central values from older searches while PDG live displays the Belle II evidence measurement."
  - "No experimental likelihood or correlations are reproduced here; the 2025 Belle II likelihood release is only recorded as a source for later implementation work."
