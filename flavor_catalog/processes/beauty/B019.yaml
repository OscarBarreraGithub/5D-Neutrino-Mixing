code_coverage:
  status: "NO"
  evidence:
    - "Targeted regex search for R_K*, K*0 ee/mumu, C_9, C_10, LFU, lepton universality, and b -> s ell ell returned no matches in the required code directories."
    - "quarkConstraints/modern/phenomenology.py:23 lists only epsilon_K, K, B_d, B_s, and D0 as modern phenomenology systems."
    - "quarkConstraints/modern/phenomenology.py:166 states that the modern phenomenology fence is policy-only."
    - "quarkConstraints/deltaf2.py:209 defines the legacy Delta F = 2 input set."
    - "quarkConstraints/deltaf2.py:903 and quarkConstraints/deltaf2.py:922 implement B_d and B_s mixing, not Delta B = 1 semileptonic observables."
    - "flavorConstraints/muToEGamma.py:75 implements check_mu_to_e_gamma; no b -> s ell ell routine is present."
  commands:
    - >-
      rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e|K\\^\\*|Kstar|K\\*0|C_9|C_10|lepton universality|LFU|RKstar|R_Kstar|R_\\{K\\^\\*\\}" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
    - >-
      rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'
    - >-
      rg -n "R_?K\\*|R_?Kstar|R_\\{K\\^\\*\\}|B0[_ ]K\\*0|K\\*0[_ ]e|K\\*0[_ ]mu|B\\^0.*K\\^\\*|C_9|C_10|lepton universality|LFU|b\\s*->\\s*s\\s*(ell|l|mu|e)|b\\s*to\\s*s" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'
implementation_difficulty: "HIGH"
