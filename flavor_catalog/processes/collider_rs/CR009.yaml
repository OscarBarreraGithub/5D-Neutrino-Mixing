  commands:
    - "rg -n -i \"drell|dilepton|high[- ]mass|contact interaction|compositeness|llqq|four[- ]fermion|dy tail\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n -i \"ATLAS|CMS|HEPData|CheckMATE|MadAnalysis|SModelS|Delphes|Pythia|MadGraph|collider\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n -i \"M_KK|MKK|Mkk|min.*KK|KK.*min|mkk_min|MKKmin|scan.*mass|constraint.*scale|bound\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  findings:
    - "No Drell-Yan, dilepton-tail, contact-interaction, llqq, four-fermion collider, or dy-tail implementation was found."
    - "No collider reinterpretation tools or hooks (CheckMATE, MadAnalysis, SModelS, Delphes, Pythia, MadGraph) were found."
    - "The only ATLAS/CMS-oriented grep hit in the second query was unrelated: tests/test_alpha_s.py:88-89 names a CMS/RunDec alpha_s example."
    - "Adjacent code computes M_KK and low-energy Delta F=2 constraints: quarkConstraints/scan.py:359, quarkConstraints/scan.py:376, quarkConstraints/scan.py:377, quarkConstraints/scan.py:379, quarkConstraints/deltaf2.py:320."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "Requires a binned high-mass dilepton likelihood or external reinterpretation, RS neutral-vector matching to semileptonic SMEFT operators, PDF/electroweak systematics, and EFT-validity/resonance-region logic."
constraint_validity:
  experimental_status: "robust observed lower limits in benchmark llqq contact-interaction models"
