code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  grep_commands:
    - "rg -n \"vector[- ]?like|VLQ|Tbar|Bbar|t.?prime|b.?prime|top partner|bottom partner|custodial partner|heavy partner|collider_rs|CheckMATE|MadAnalysis|SModelS\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"ATLAS|CMS|LHC|collider|mass exclusion|95% CL|cross.?section upper|excluded at 95|pair.?produ\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  findings:
    - "No CR010/VLQ/vector-like/top-partner/bottom-partner/collider_rs implementation was found."
    - "The ATLAS/CMS/LHC grep returned only tests/test_alpha_s.py:89, a CMS/RunDec alpha_s example unrelated to collider mass exclusions."
    - "Adjacent scan code computes M_KK and Delta F=2 ratios but no collider filter: quarkConstraints/scan.py:359-441 records M_KK, deltaf2_passes, epsilon_k_ratio, b_d_mix_ratio, b_s_mix_ratio, d_mix_ratio, and passes_all."
    - "Validation uses the same Delta F=2 summary without collider inputs: quarkConstraints/validation.py:108-145."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "A live CR010 constraint requires spectrum and branching-fraction matching plus a recast or simplified-likelihood layer; direct hard-coded mass cuts would miss the strong branching, width, mass-splitting, and cascade-dependence of LHC VLQ searches."
constraint_validity:
  experimental_status: "Observed LHC mass-exclusion limits; no significant excess in the cited searches."
  model_dependence: "QCD pair production is robust, but acceptance and the mass limit depend on prompt decays, widths, branching fractions, mass degeneracy, and the absence of nonstandard RS cascades."
  relevant_rs_parameters:
    - "custodial-partner masses m_T and m_B"
    - "branching fractions into Wb, Zt, Ht, Wt, Zb, Hb"
    - "mapping between custodial fermion spectrum and gauge KK scale M_KK"
open_issues:
  - "WA/CA should decide whether to keep the simplified individual T/B endpoints in the CR010 prose or leave only the canonical 1.37 TeV doublet value."
  - "A future implementation would need a shared collider_rs recast interface rather than per-process hard-coded mass thresholds."
