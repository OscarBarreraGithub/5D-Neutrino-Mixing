constraint_validity:
  experimental_status: "robust null-search upper limits and benchmark mass exclusions in prompt ee and mumu spectra"
  model_dependence:
    - "SSM Z' mass limits assume SM-like fermion couplings and benchmark widths, not a custodial-RS coupling pattern."
    - "Custodial-RS neutral KK bosons can be broad and can preferentially decay to third-generation fermions, Higgs-sector states, or longitudinal electroweak bosons."
    - "Light-quark production couplings and dilepton branching fractions must be supplied before translating the 5.15 TeV SSM benchmark into M_KK."
  relevant_rs_parameters:
    - "first neutral electroweak KK gauge-boson masses"
    - "light-quark zero-mode overlap/coupling to neutral KK gauge modes"
    - "charged-lepton overlap/coupling to neutral KK gauge modes"
    - "total width and branching fractions to ee and mumu"
code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  grep_commands:
    - "rg -n \"CR005|collider_rs|KK.?electroweak|electroweak.?KK|KK.?gauge|gamma.?\\\\(1\\\\)|Z.?\\\\(1\\\\)|Zprime|Z.?prime|Z'|dilepton|di-lepton|high.?mass.*lepton|resonance.*lepton|heavy.*gauge\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"M_KK|MKK|KK|mKK|mass.*KK|KK.*mass|M_KK\\\\^\\\\{min\\\\}|min.*M_KK|g_\\\\*|gstar|g_star|47\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"CheckMATE|MadAnalysis|SModelS|Delphes|Pythia|MadGraph|Herwig|Collider|LHC|ATLAS|CMS|HEPData|luminosity|cross.?section|CLs|confidence\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"47|M_\\\\{KK\\\\}|M_KK|g_\\\\{\\\\*\\\\}|g\\\\*_?\\\\s*=\\\\s*3|quark scan|quark-scan\" docs/quark_scan_methodology_note.tex docs -g '*.tex' -g '*.md'"
  findings:
    - "No direct high-mass dilepton resonance search, collider likelihood, ATLAS/CMS/HEPData ingestion, or electroweak KK-gauge filter was found."
    - "False-positive Z-prime query hits were only qcd/__init__.py:57-59 for ALPHA_S_MZ/M_Z exports."
    - "Collider-keyword grep found tests/test_alpha_s.py:88-90, a CMS/RunDec alpha_s example, not a collider constraint."
    - "Adjacent implemented RS-flavor coverage is quark Delta F=2: quarkConstraints/deltaf2.py:1-10 and 320-324."
    - "Adjacent KK-coupling coverage is quark KK-gluon only: quarkConstraints/couplings.py:96-124."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "A faithful live constraint needs a neutral electroweak KK signal model, parton luminosities or event generation, total-width and branching-ratio predictions, and a likelihood or external reinterpretation of ATLAS/CMS dilepton limits. A simple universal M_KK mass cut would overstate the SSM benchmark."
open_issues:
  - "WA/CA should verify whether to keep both CMS 5.15 TeV and ATLAS 5.1 TeV as pdg_or_equivalent values or collapse ATLAS to a supporting cross-check."
  - "A future implementation must choose whether CR005 is applied as a narrow Z'-like proxy, a broad custodial-RS reinterpretation, or only a flagged external collider diagnostic."
