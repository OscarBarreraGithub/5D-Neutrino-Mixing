constraint_validity:
  experimental_status: "No significant excess; direct 95% CL mass-exclusion interval for the stated benchmark."
  model_dependence:
    - "Assumes the experimental KK-gluon signal model, including width, production couplings, and branching fraction to ttbar."
    - "Reduced ttbar branching, decays to vector-like partners, broader line shapes, or sizable interference require recasting."
    - "Not directly a bound on custodial heavy fermion partner masses; those are separate searches."
  relevance_class: "Cross-check and non-anarchic-RS leverage; subleading to low-energy flavor constraints in the anarchic g_s*=3 pipeline."
code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  grep_commands:
    - "rg -n \"KK.?gluon|g_?KK|Kaluza.?Klein.*gluon|Randall.?Sundrum|bulk RS|warped extra|extra dimension|RS resonance|custodial.?RS|custodial RS\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"ttbar|t\\\\bar\\{t\\}|tbar|top.?anti|top.?quark.?pair|top.?pair|resonance|heavy.?gluon|vector.?like|T_?5/?3|T5/3|CheckMATE|MadAnalysis|SModelS|LHC\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"M_?KK|MKK|Mkk|KK|mKK|M_KK|min|p50|ratio|bound\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  findings:
    - "Direct collider-search query returned no matches for ttbar/top-pair resonance/LHC/recast tooling terms."
    - "Adjacent low-energy KK-gluon code exists: quarkConstraints/couplings.py:1 and quarkConstraints/deltaf2.py:1 define KK-gluon flavor couplings and Delta F=2 matching."
    - "The quark scan computes M_KK and evaluates Delta F=2 ratios at quarkConstraints/scan.py:359-380, but it does not apply an LHC direct-search filter."
    - "quarkConstraints/modern/matching.py:241-243 explicitly describes the modern bridge as a wrapper over compact KK-gluon formulas, not a full operator-complete EFT/RG package."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "Requires external collider-recast machinery or collaboration likelihoods, including signal generation, top-tagging efficiencies, acceptance, resolution, width and interference dependence, and benchmark-specific branching assumptions."
open_issues:
  - "WA/CA should verify whether to keep both the PDG Live lagging 3.8 TeV row and the CMS 2026 current-best 5.5 TeV row in prose; both are tracked for auditability."
  - "HEPData table-file download was Cloudflare-challenged from curl; the HEPData record extract and DOI are tracked, and the arXiv/CMS abstract contains the canonical 5.5 TeV mass edge."
