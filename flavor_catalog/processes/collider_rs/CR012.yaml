constraint_validity:
  experimental_status: "No significant excess; current observed 95% CL lower mass limits are benchmark-model exclusions."
  model_dependence: "HVT benchmark, resonance width, light-quark couplings, VBF/DY production mix, and VV/VH branching fractions control the mapping to any concrete RS spectrum."
  rs_mapping_notes:
    - "Constrains electroweak KK-vector or custodial-vector masses only after specifying the gauge extension, fermion embeddings, and branching fractions."
    - "Does not directly constrain the color-octet KK gluon unless a model supplies appreciable diboson decays."
    - "The 4.8 TeV number combines VV and VH and should not be used as a pure-diboson-only threshold."
code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  commands:
    - "rg -n \"CR012|collider_rs|diboson|di[- ]?boson|WW|WZ|ZZ|Wprime|W\\\\'|W'|Zprime|Z\\\\'|Z'|Vprime|V\\\\'|HVT|heavy vector|resonance\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"ATLAS|CMS|LHC|Run.?2|13 TeV|95% CL|cross.?section|mass exclusion|limit.*TeV|CheckMATE|MadAnalysis|SModelS|HEPData\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"M_KK|MKK|Mkk|KK|Kaluza|gluon|g\\*|gsstar|gstar|mass_scale|mKK\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"diboson|di[- ]?boson|HVT|heavy vector|Wprime|Zprime|Vprime|CheckMATE|MadAnalysis|SModelS|HEPData|ATLAS|CMS|13 TeV|95% CL|mass exclusion\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  findings:
    - "No CR012, collider_rs, diboson, HVT, ATLAS/CMS, HEPData, or reinterpretation-tool implementation was found."
    - "The only CMS match in the collider-search grep was tests/test_alpha_s.py:89, a CMS/RunDec QCD-running example rather than an LHC search."
    - "Adjacent KK-scale code exists: quarkConstraints/scan.py:359 computes M_KK from Lambda_IR; quarkConstraints/scan.py:377 calls the Delta F=2 evaluator; quarkConstraints/scan.py:379 passes KK-gluon couplings into it."
    - "quarkConstraints/deltaf2.py:320 documents tree-level KK-gluon-inspired Delta F=2 Wilsons, not collider direct searches."
    - "scanParams/scan.py:523 starts only the mu -> e gamma LFV filter in that scan path."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "A live CR012 constraint needs collider likelihoods or recast tools plus an RS spectrum, widths, production cross sections, and branching fractions; a scalar mass-threshold filter would not preserve the model assumptions behind the published limits."
open_issues:
  - "WA kept the 4.8 TeV degenerate-HVT result as a VV+VH caveat, not as the pure-diboson headline; use the 4.4 TeV W'->WZ and 4.5 TeV V'->VV rows for diboson-only statements."
  - "A future implementation should choose a recast backend before adding any code-level collider_rs filters."
