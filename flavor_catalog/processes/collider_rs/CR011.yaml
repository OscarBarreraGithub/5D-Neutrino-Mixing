implementation_difficulty: "HIGH"
implementation_difficulty_reason: "A live collider-RS constraint needs a full collider likelihood or recast workflow, including signal generation, detector/selection acceptance, polarization templates, model-dependent branching ratios, and external tools such as CheckMATE, MadAnalysis5, or SModelS where applicable."
