implementation_difficulty: "HIGH"
implementation_difficulty_reason: "Needs a new collider-reinterpretation layer: RS spin-2 spectrum prediction, widths, branching fractions, production cross sections, and ATLAS/CMS acceptance or likelihood recasts, likely via MadGraph/Pythia/Delphes plus CheckMATE, MadAnalysis5, Rivet, SModelS, or HEPData-derived limit curves."
constraint_validity:
  experimental_status: "Robust null-search mass and cross-section exclusions for stated ATLAS/CMS benchmark models."
  model_dependence: "Strong: limits depend on k/Mbar_Pl, width, production mode, branching fractions, and whether SM fields propagate in the bulk. Generic diphoton/dilepton RS limits are not automatically applicable to suppressed-light-fermion bulk-RS points."
  rs_handle: "Constrains the first spin-2 KK graviton mass for benchmark spectra; it does not by itself constrain the KK gluon or vectorlike fermion mass without a model spectrum."
open_issues:
  - "WA/CA should decide whether the PDG-leading generic RS diphoton value or the CMS bulk-graviton WW/ZZ value should be the display headline in any future index table."
  - "A future implementation should use per-channel cross-section-times-branching limits from the experimental papers or HEPData rather than a universal mass cut."
