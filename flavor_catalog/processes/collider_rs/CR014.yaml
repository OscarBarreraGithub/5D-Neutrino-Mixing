constraint_validity:
  experimental_status: "Inclusive four-top production is observed by ATLAS and CMS; direct top-philic four-top resonance exclusions are benchmark-specific."
  model_dependence: "High. Requires assumptions about resonance spin, width, coupling pattern, branching ratios, production mechanism, and detector acceptance."
  rs_sensitivity:
    - "KK-gluon or composite-vector exchange coupling preferentially to IR-localized tops"
    - "fermionic top partners feeding four-top final states through cascade or off-shell effects"
    - "four-top contact operators from top compositeness"
  caveat: "No model-independent M_KK limit follows from CR014 without a collider reinterpretation."
