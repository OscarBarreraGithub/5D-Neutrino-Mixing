code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  grep_commands:
    - "rg -n -i \"wprime|w_prime|kkw|wkk|kk w|w kk|charged-current|charged current|high-mass|missing transverse|atlas|cms|lhc|collider\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n -F \"W'\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n -F \"W^{\\prime}\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n -F \"W_KK\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"deltaf2_max_ratio|epsilon_k_ratio|b_d_mix_ratio|b_s_mix_ratio|d_mix_ratio|max_ratio_to_bound|check_mu_to_e_gamma|reason.*mu_to_e_gamma|M_KK\" scanParams/scan.py quarkConstraints/scan.py quarkConstraints/modern/scan.py quarkConstraints/modern/evaluation.py quarkConstraints/deltaf2.py flavorConstraints/muToEGamma.py tests/test_scan.py tests/test_quark_scan.py -g '!*.ipynb'"
  findings:
    - "No CR006/W'/W_KK/collider-resonance implementation was found."
    - "The only ATLAS/CMS/LHC-like grep match is unrelated: tests/test_alpha_s.py:88-89 is a CMS/RunDec alpha_s example."
    - "The scan stores M_KK and low-energy ratios only: quarkConstraints/scan.py:418-439 writes M_KK and Delta F=2 ratios."
    - "The lepton-sector scan uses mu->e gamma only: scanParams/scan.py:524-535 calls check_mu_to_e_gamma and records mu_to_e_gamma as a reject reason."
    - "Delta F=2 matching/evaluation is present at quarkConstraints/deltaf2.py:316-560, but no direct collider search or W' likelihood layer is present."
implementation_difficulty: "HIGH"
implementation_difficulty_reason: "Needs a collider reinterpretation workflow: RS charged-vector production and decays, branching fractions to tb/WZ/Wh/exotics, finite-width/interference handling, detector acceptance, and ATLAS/CMS likelihood or recast machinery."
constraint_validity:
  experimental_status: "Robust direct mass exclusions for the stated W' simplified models."
  rs_model_dependence: "High. SSM lnu limits assume light-quark and charged-lepton couplings that can be suppressed in custodial RS; tb limits are closer but still depend on chirality, total width, production coupling, and branching fraction assumptions."
  relevant_rs_masses:
    - "charged electroweak gauge KK mode mass M_{W_KK}"
    - "nearby custodial charged-vector masses when degenerate"
    - "indirectly, heavy-fermion partner thresholds if W_KK decays to exotic fermions open"
open_issues:
  - "WA/CA should decide whether to add HEPData table snapshots for a future limit-curve implementation. This PKA draft did not use HEPData values."
  - "A later implementation should not impose the SSM lnu mass bound as a hard anarchic-RS scan cut without an explicit RS recast."
