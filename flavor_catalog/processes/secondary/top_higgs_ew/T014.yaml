implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "External-limit bookkeeping is low effort, but a production RS constraint needs new electroweak Delta F=1 matching for off-diagonal Z down-quark couplings, custodial-embedding conventions, and a policy for combining direct Z-width and low-energy flavor-derived coupling bounds."
open_issues:
  - "No dedicated current ATLAS/CMS or PDG Z -> bs/bd/sd search row was located; WA/CA should verify whether any experiment-specific LHC direct search appeared after the ECFA/Kamenik summaries."
  - "The prompt's suggested Mele hep-ph/0007068 identifier resolves to an unrelated polarized-parton paper. Mele hep-ph/0003064 is a top rare-decay review; T014 instead uses Eilam hep-ph/0211458 and modern FV-Z sources for the down-sector Z-decay context."
  - "The sd channel has a direct-search treatment through the generic Z -> q_i qbar_j width bound and the 2026 quark-FV-Z coupling survey, but no modern SM branching prediction was located in the same canonical summaries."
