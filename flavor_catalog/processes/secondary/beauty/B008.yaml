code_coverage:
  status: "NO"
  evidence:
    - "Focused B008 grep found no B_s/B_d -> tau+ tau- or b -> s,d tau+ tau- rare-leptonic observable implementation."
    - "quarkConstraints/deltaf2.py:903 defines evaluate_bd_mixing, a Delta F = 2 B_d-mixing observable, not B_d -> tau+ tau-."
    - "quarkConstraints/deltaf2.py:922 defines evaluate_bs_mixing, a Delta F = 2 B_s-mixing observable, not B_s -> tau+ tau-."
    - "quarkConstraints/modern/phenomenology.py:646 and quarkConstraints/modern/phenomenology.py:657 evaluate B_d/B_s mixing from the bridge; no Delta B = 1 rare leptonic branch is present."
    - "flavorConstraints/muToEGamma.py:75 defines check_mu_to_e_gamma, an unrelated charged-lepton dipole constraint."
    - "scanParams/README.md:161 mentions y_tau as a scan parameter, not a B -> tau tau observable."
  grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
    - "rg -n \"B_s.*tau|Bs.*tau|B0_s.*tau|B_d.*tau|B0.*tau|B\\\\^0.*tau|tau\\\\+.*tau|tau.*tau|tautau|b[[:space:]-]*->[[:space:]-]*s.*tau|b[[:space:]-]*->[[:space:]-]*d.*tau|C_10|C10|C_S|C_P|pseudoscalar|scalar.*operator|rare_decay|rare decay|rare leptonic|dilepton|ditau\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
implementation_difficulty: "MEDIUM"
implementation_difficulty_if_missing: "MEDIUM"
implementation_notes: "Needs a new Delta B = 1 pure-leptonic branching-ratio evaluator for B_q -> tau+ tau- with tau phase space and C10, scalar, and pseudoscalar Wilson coefficients. No exclusive form-factor or angular-analysis machinery is needed for the catalog-level upper-limit constraint."
constraint_validity:
  class: "upper-limit; model-dependent for RS interpretation"
  notes:
    - "The PDG/LHCb limits are one-mode-at-a-time upper limits and should not be treated as Gaussian measurements."
    - "A simultaneous B_s/B_d interpretation should account for the LHCb assumptions that the other neutral mode is absent when quoting each limit."
    - "Tau reconstruction uses modes with missing neutrinos; detector acceptance belongs in supporting context, not pdg_or_equivalent."
open_issues:
  - "Future implementation choice: approximate the LHCb limits independently or obtain a two-dimensional likelihood for simultaneous B_s and B_d tauonic decays."
