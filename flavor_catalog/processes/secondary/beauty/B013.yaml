code_coverage:
  status: "NO"
  grep_commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"B_s.*phi.*gamma|B0_s.*phi.*gamma|phi.*gamma|phigamma|phi_gamma|B_s0.*gamma|b.?->.?s.?gamma|b.?to.?s.?gamma|C7'?|C_7'?|O7'?|A_Delta|A.?Delta|S_phi|Sphigamma|photon.?polar|right.?handed.?dipole\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  evidence:
    - "Focused B013 grep for B_s -> phi gamma, S_phi, A_Delta, b->s gamma dipoles, C7/C7', and photon-polarization terms returned exit=1 with no implementation hits."
    - "quarkConstraints/modern/phenomenology.py:23 enumerates the modern quark surface as epsilon_K, K, B_d, B_s, and D0 neutral-meson mixing systems."
    - "quarkConstraints/deltaf2.py:903 and quarkConstraints/deltaf2.py:922 implement B_d and B_s mixing evaluators, not radiative b -> s gamma decays."
    - "flavorConstraints/muToEGamma.py:75 defines check_mu_to_e_gamma, an unrelated lepton-sector dipole check."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "Requires new b -> s gamma dipole matching and RG, exclusive B_s -> phi form-factor/resonance inputs, and a B_s time-dependent CP/helicity likelihood; current Delta F=2 code and lepton-dipole code do not implement this observable."
open_issues:
  - "WA/CA should decide whether the final display should headline the rounded PDG 2025 value or the more granular HFLAV Dec. 2024 average; both are recorded and agree."
