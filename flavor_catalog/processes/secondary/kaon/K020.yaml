constraint_classification:
  experimental_class: "upper_limit"
  model_dependence: "HIGH"
  sm_background: "forbidden/negligible in the SM with charged-lepton flavor conservation"
  operator_requirements:
    - "Delta S = 1 semileptonic LFV four-fermion operators"
    - "Separate chiral structures for K+ -> pi+ mu+ e- and K+ -> pi+ mu- e+"
    - "K -> pi form-factor treatment for vector/scalar/tensor operators"
    - "Lepton-sector RS matching for bulk profiles, seesaw spurions, or shifted Z/Higgs couplings"
code_coverage:
  status: "NO"
  evidence:
    - "No K020, S010.29, S010.25, or K+ -> pi+ e mu implementation was found in the requested directories."
    - "K020-specific grep finds only generic LFV scan metadata and the existing mu->e gamma dipole module, not a semileptonic kaon rate."
    - "Broader greps find implemented Delta F = 2 kaon/B/D surfaces and mu->e gamma only."
  required_grep_commands:
    - command: "rg -n \"K020|S010\\.29|S010\\.25|K\\+.*pi\\+.*(mu|e)|pi\\+.*(mu|e).*(e|mu)|K.*pi.*e.*mu|K.*pi.*mu.*e|mu\\+ e-|mu- e\\+|LFV|lepton.?flavo(u)?r\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
      result_summary: "Only generic LFV metadata in scanParams, flavorConstraints/muToEGamma.py, flavorConstraints/README.md, and tests; no K020-specific implementation."
    - command: "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
      result_summary: "Finds the existing Delta F = 2 meson-mixing lane and mu->e gamma dipole lane only."
    - command: "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e|e.?mu|mu.?e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
      result_summary: "Large broad search returns QCD, Delta F = 2, dipole, and documentation hits; no K+ -> pi+ e mu observable."
    - command: "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma|muToEGamma|deltaf2\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
      result_summary: "Confirms current code surfaces are epsilon_K/K/B_d/B_s/D0 Delta F = 2 systems and mu->e gamma."
  near_miss_evidence:
    - "flavorConstraints/muToEGamma.py:75 defines check_mu_to_e_gamma(), a dipole LFV check rather than a semileptonic kaon observable."
    - "scanParams/scan.py:524 calls check_mu_to_e_gamma() in scans; no analogous K020 call is present."
    - "quarkConstraints/deltaf2.py:755 defines evaluate_delta_mk(), a neutral-kaon mixing observable, not Delta S = 1 K+ -> pi+ e mu."
    - "quarkConstraints/modern/phenomenology.py:23 lists MODERN_PHENOMENOLOGY_SYSTEM_IDS = (\"epsilon_K\", \"K\", \"B_d\", \"B_s\", \"D0\")."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "Requires a new Delta S = 1 semileptonic LFV operator basis, K -> pi form-factor/rate calculation, and lepton-sector RS matching; existing Delta F = 2 and mu->e gamma machinery cannot provide this observable."
open_issues:
  - "WA/CA should decide whether the final prose should call this the charged-kaon companion to K019 rather than the prompt's charged-current phrasing, since the quark-level transition is neutral-current-like s -> d e mu."
  - "If promoted to live code, PI should specify whether to support a general LFV EFT basis first or a narrower RS KK-gauge/Z/Higgs matching convention."
