code_coverage:
  status: "NO"
  evidence:
    - "No exact K019 / K_L -> e mu / s->d e mu implementation found in quarkConstraints, qcd, flavorConstraints, neutrinos, yukawa, warpConfig, solvers, scanParams, or tests."
    - "Adjacent lepton LFV code is mu->e gamma only: flavorConstraints/muToEGamma.py:1 documents a mu->e gamma constraint, and lines 15-21 tie the rate to the (Ybar_N Ybar_N^dagger)12 dipole spurion."
    - "The scanner consumes only the mu->e gamma LFV check: scanParams/scan.py:523-535 calls check_mu_to_e_gamma and records the reason string mu_to_e_gamma."
    - "Adjacent kaon code is quark Delta F=2: quarkConstraints/deltaf2.py:610-624 defines kaon hadronic parameters for epsilon_K and Delta m_K, not semileptonic LFV K_L decay."
  grep_commands:
    - "rg -n \"K019|K_L|KL|K0_L|K\\\\^0_L|kaon.*LFV|LFV.*kaon|lepton.?flavo[u]?r.*kaon\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"e\\\\s*mu|mu\\\\s*e|electron.*muon|muon.*electron\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"Delta.?S.?=.?(1|one)|s.?->.?d|sd.*(electron|muon|lepton)|d.*s.*e.*mu|s.*d.*e.*mu|Wilson.*lepton|semileptonic.*kaon\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"mu.?->.?e|muToE|mu_to_e|mu.*e.*conversion|charged.?lepton|LFV|lepton.?flavo[u]?r\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"K_L\\\\s*->\\\\s*(e|mu)|KL\\\\s*->\\\\s*(e|mu)|K0_L\\\\s*->\\\\s*(e|mu)|K\\\\^0_L\\\\s*->\\\\s*(e|mu)|e\\\\^\\\\{?\\\\\\\\pm\\\\}?\\\\s*mu|mu\\\\^\\\\{?\\\\\\\\pm\\\\}?\\\\s*e|muon.*electron.*kaon|electron.*muon.*kaon\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
implementation_difficulty: "MEDIUM"
implementation_difficulty_if_missing: "MEDIUM"
implementation_difficulty_rationale: "Requires new Delta S = 1 charged-LFV semileptonic Wilson coefficients and matching from a lepton-bulk or leptoquark RS extension, but the physical observable is a clean two-body upper limit with standard kaon decay-constant and quark-mass inputs and no long-distance SM subtraction."
constraint_validity:
  experimental_status: "robust upper limit on summed charge states"
  model_dependence: "Not a primary quark-only RS constraint; becomes active only once the model supplies e-mu LFV couplings in addition to s-d flavor violation."
  relevant_operator_classes:
    - "vector/axial semileptonic current-current operators from neutral KK gauge or Z exchange"
    - "scalar/pseudoscalar operators from Higgs or leptoquark structures, potentially chirality enhanced by the pseudoscalar kaon matrix element"
    - "dipole sector indirectly relevant through the same charged-lepton misalignment, but not sufficient by itself for the two-body kaon decay"
open_issues:
  - "WA/CA should verify whether to add a separate supporting note for post-2008 K_S -> e mu searches; they are not the canonical K_L observable and were not promoted in this PKA draft."
  - "If the implementation later targets Pati-Salam RS rather than neutral KK gauge exchange, K019/K020/K021 should share a common leptoquark operator normalization."
