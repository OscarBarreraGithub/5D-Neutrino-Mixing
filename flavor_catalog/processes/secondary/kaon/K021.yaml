code_coverage:
  status: "NO"
  evidence:
    - "Exact K021 / pi0 mu e searches across the required code directories produced no matches."
    - "Generic semileptonic LFV kaon searches produced no K->pi e mu or s->d e mu implementation hits."
    - "Existing nearby code is limited to Delta F=2 kaon mixing and mu->e gamma LFV: quarkConstraints/deltaf2.py:1, quarkConstraints/deltaf2.py:615, flavorConstraints/muToEGamma.py:1."
  grep_commands:
    - "rg -n \"K021|pi0.*mu.*e|pi0.*e.*mu|pi\\\\^0.*mu.*e|pi\\\\^0.*e.*mu|K_L.*pi0.*mu.*e|K_L.*pi0.*e.*mu|K0L.*pi0.*mu.*e|KL.*pi0.*mu.*e|mu.*e.*pi0|e.*mu.*pi0\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb' || true"
    - "rg -n \"K.*LFV|LFV.*K|kaon.*LFV|s.?->.?d.*mu.*e|s.?->.?d.*e.*mu|Delta.?S.*mu.*e|Delta.?S.*e.*mu|semileptonic.*LFV|four.?fermion.*LFV\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb' || true"
    - "rg -n \"mu.?to.?e.?gamma|muToEGamma|BR\\\\(mu|br_limit|PREFAC_BR|Y_N|seesaw|LFV\" flavorConstraints scanParams yukawa neutrinos tests -g '!*.ipynb'"
    - "rg -n \"epsilon_K|Delta_m_K|DELTA_M_K|M12_K|DeltaF2|deltaf2|neutral-kaon mixing|KK-gluon\" quarkConstraints tests -g '!*.ipynb'"
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "Requires new Delta S = 1 semileptonic LFV operators, K->pi form-factor plumbing, and RS matching for simultaneous quark and lepton off-diagonal couplings; existing Delta F=2 and mu->e gamma code is not sufficient."
constraint_validity:
  experimental_limit: "Robust upper limit on the summed charge-state branching fraction."
  model_dependence: "High for RS interpretation; requires operator-basis and lepton-localization assumptions."
  correlated_processes:
    - "K_L -> e^+- mu^-+"
    - "K+ -> pi+ e^+- mu^-+"
    - "mu -> e gamma"
    - "mu -> e conversion"
open_issues:
  - "WA/CA should confirm that no newer direct K_L -> pi0 e mu measurement appears outside the PDG 2025 K_L0 listing."
  - "A future implementation should decide whether K020 and K021 share one semileptonic LFV EFT module with charged/neutral isospin conventions."
