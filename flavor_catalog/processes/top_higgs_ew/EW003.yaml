  findings:
    - "The repo partially covers EW003 through CKM target/tolerance metadata for |V_cb| and |V_ub|."
    - "No implementation was found for inclusive or exclusive semileptonic B decay rates, HFLAV/FLAG split likelihoods, B->D(*)l nu, B->pi l nu, or b->c/u tau nu charged-current WET operators."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "A live EW003 constraint needs a new charged-current semileptonic likelihood, inclusive-scheme handling, exclusive lattice form-factor inputs, and optional b->c/u tau nu WET operator matching. This is not covered by the existing Delta F = 2 SLL/SLR/VLL/VRR/LR1/LR2 machinery."
open_issues:
  - "WA/checker should decide whether EW003 remains an electroweak CKM-input diagnostic or is later split into beauty semileptonic process entries."
  - "Production implementation would need a policy choice between PDG scaled averages, HFLAV exclusive/inclusive split likelihoods, and global-fit CKM targets already used by quarkConstraints/scan.py."
