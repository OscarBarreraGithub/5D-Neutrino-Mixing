    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests docs -g "!*.ipynb"'
    - 'rg -n "t.?->.?u.?Z|t.?->.?Z.?u|tuZ|tZu|tZq|FCNC|flavou?r-changing|flavor changing|Z.?u" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "MEDIUM to store the external upper limit, but HIGH for production-grade RS integration because the repo lacks electroweak top-FCNC matching, a tuZ decay-width/production interpretation, and top-sector flavor-rotation plumbing."
open_issues:
  - "A future WA/CA should decide whether to quote the left-handed ATLAS benchmark as the single headline limit, or keep both chiral benchmarks equally prominent."
  - "A live implementation needs an RS-to-SMEFT or direct Ztu convention choice before numerical scans can use this limit."
