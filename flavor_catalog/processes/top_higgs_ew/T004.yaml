code_coverage:
  status: "NO"
  evidence:
    - "Required plan greps rerun on 2026-05-16 across quarkConstraints/, qcd/, flavorConstraints/, neutrinos/, yukawa/, warpConfig/, solvers/, scanParams/, and tests/."
    - "The implemented hits are the existing neutral-meson Delta F = 2 and mu -> e gamma paths; no top FCNC photon observable, tqgamma Wilson coefficient, or t -> u gamma branching-ratio check was found."
    - "Targeted grep for t -> u gamma / tu gamma / tq gamma / top-photon FCNC returned no matches in the inspected code paths."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
    - 'rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
    - 'rg -n "t.?->.?u.?gamma|t.?->.?gamma.?u|tu.?gamma|tq.?gamma|FCNC.*gamma|top.*photon|photon.*top|B\\(t.*u.*gamma\\)|BR\\(t.*u.*gamma\\)" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "Cataloging the limit is straightforward, but production integration needs a new electroweak dipole/top-FCNC operator convention, RS-to-top-flavor matching for t-u rotations, and a t -> u gamma decay-width or production/decay recast path not present in the current Delta F = 2 and mu -> e gamma code."
open_issues:
  - "WA/CA should decide whether the headline experimental number should be the ATLAS left-handed benchmark alone or both ATLAS chirality benchmarks."
  - "A live backend must define the tqgamma operator normalization before applying the branching-fraction bound to scan points."
