    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests docs -g "!*.ipynb"'
    - 'rg -n "t.?->.?c.?g|t.?->.?g.?c|tcg|tgc|c.?g.?->.?t|tqg|uG|ctg|FCNC|flavou?r-changing|flavor changing" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "Limit cataloging is MEDIUM, but production-grade integration is HIGH because the repo lacks a top chromomagnetic FCNC operator convention, RS-to-SMEFT matching, t -> c g width and c g -> t production normalization, collider/PDF reinterpretation machinery, and QCD-running choices for this operator."
open_issues:
  - "WA/CA should decide whether the headline value should be the PDG/pdgLive ATLAS 13 TeV 3.7e-4 limit or also foreground the older CMS 4.1e-4 comparison; this draft keeps PDG/pdgLive ATLAS as canonical."
  - "The ATLAS 13 TeV result is quoted for a left-handed SMEFT C_uG interpretation; a live RS implementation needs a convention for chiral chromomagnetic coefficients and correlated operators."
  - "PDG also lists an older AAD 2016AS ATLAS 8 TeV note with B(t -> c g) < 20e-5; this draft does not use it as the headline because the current ATLAS Run-2 EFT entry is the cleaner primary source."
