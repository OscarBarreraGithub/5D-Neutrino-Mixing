code_coverage:
  status: "NO"
  evidence:
    - "Targeted grep for Z -> e tau / Z -> tau e / Zetau / ZeTau / LFV Z strings across required code directories returned no hits."
    - "The only charged-lepton LFV implementation found is mu -> e gamma: flavorConstraints/muToEGamma.py:75."
    - "The scan calls the mu -> e gamma LFV filter at scanParams/scan.py:524."
    - "The modern phenomenology policy surface is limited to epsilon_K, K, B_d, B_s, and D0: quarkConstraints/modern/phenomenology.py:23."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "Z.?->.?e.?tau|Z.?->.?tau.?e|Z.?to.?e.?tau|Z.?to.?tau.?e|Zetau|ZeTau|e.?tau.*Z|tau.?e.*Z|lepton.?flavou?r.*Z|LFV.*Z" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "MEDIUM to store the branching-ratio upper limit, but HIGH for production-grade RS integration because the repo lacks LFV Z-coupling operators, electroweak/lepton-sector matching, and a policy for combining direct Z-pole and low-energy tau LFV constraints."
open_issues:
  - "CA should verify whether a newer PDG listing has changed the Z -> e tau row; as of the 2025 listing the ATLAS combined 5.0e-6 limit is canonical."
  - "A live scan implementation needs a convention for left/right off-diagonal Z e tau couplings and their correlation with tau dipole and four-lepton observables."
