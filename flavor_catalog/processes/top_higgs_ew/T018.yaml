code_coverage:
  status: "NO"
  evidence:
    - "Targeted grep for h -> mu tau / H -> mu tau / mutau / Y_mu_tau across the required code directories returned no hits."
    - "The existing charged-lepton LFV implementation is mu -> e gamma only: flavorConstraints/muToEGamma.py:1 and flavorConstraints/muToEGamma.py:75."
    - "The scan applies the mu -> e gamma LFV filter at scanParams/scan.py:523; no h -> mu tau branch or Higgs LFV limit is present."
    - "Charged-lepton Yukawa support is a diagonal mass-relation helper at yukawa/charged_lepton.py:1 and yukawa/charged_lepton.py:36, not a Higgs LFV observable."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|H.?->|higgs|Higgs|LFV|lepton.?flavou?r|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests -g "!*.ipynb"'
    - 'rg -n "h.?->.?mu.?tau|H.?->.?mu.?tau|H.?->.?μ.?τ|mu.?tau|μτ|mutau|Y_mu_tau|Ymutau|Yukawa.*tau|LFV.*Higgs|Higgs.*LFV" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "The direct limit is simple to catalog, but production-grade RS integration needs a new charged-lepton Higgs-Yukawa misalignment calculation, a convention for Y_mu_tau/Y_tau_mu, and a Higgs production/total-width interpretation. The current code only has diagonal charged-lepton Yukawas and a mu -> e gamma dipole filter."
open_issues:
  - "WA/CA should decide whether the headline value should be the strongest CMS 0.15% limit or the PDG pair of CMS and ATLAS full Run-2 limits."
  - "A live scan implementation must define how RS lepton-sector parameters map to off-diagonal physical Higgs Yukawa couplings and whether non-SM Higgs production/width changes are allowed."
