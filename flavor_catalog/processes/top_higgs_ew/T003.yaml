code_coverage:
  status: "NO"
  evidence:
    - "Required plan greps rerun on 2026-05-16 across quarkConstraints, qcd, flavorConstraints, neutrinos, yukawa, warpConfig, solvers, scanParams, and tests; no source-code implementation of t -> c gamma, tcgamma, or tqgamma found."
    - "Targeted grep for top-photon FCNC and photon dipole terms found only the lepton-sector mu -> e gamma dipole implementation at flavorConstraints/muToEGamma.py:75 and related prose, not a top observable."
    - "Existing Delta F = 2 coverage starts at quarkConstraints/deltaf2.py:209."
    - "Modern phenomenology policy enumerates only epsilon_K, K, B_d, B_s, and D0 at quarkConstraints/modern/phenomenology.py:23 and states it is policy-only at quarkConstraints/modern/phenomenology.py:165."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd warpConfig solvers tests -g "!*.ipynb"'
    - 'rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd warpConfig solvers tests -g "!*.ipynb"'
    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests -g "!*.ipynb"'
    - 'rg -n "t.?->.?c.?gamma|t.?->.?gamma.?c|tcgamma|tcgamm|tqgamma|t.?c.?photon|c.?gamma|photon.*FCNC|FCNC.*photon|top.*photon|gamma.*top|dipole" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "MEDIUM to store the external upper limit, but HIGH for production-grade RS integration because the repo lacks a top electromagnetic FCNC operator basis, RS-to-dipole matching, a t -> c gamma width convention, and a validated production-plus-decay recast."
open_issues:
  - "The user prompt quoted the older ATLAS 4.2e-5 charm limit as current; CMS-TOP-21-013 now gives 1.51e-5 at 95% CL. WA/CA should confirm whether the catalog headline should use CMS or preserve an ATLAS/PDG-only convention."
  - "PDG live currently has a generic gamma q row rather than a charm-separated t -> c gamma summary; the sidecar keeps it as context, not the T003 headline."
