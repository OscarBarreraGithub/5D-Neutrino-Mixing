code_coverage:
  status: "NO"
  evidence:
    - "Required plan greps rerun on 2026-05-16; no source-code implementation of t -> u g, tug, tqg, C_uG, or u g -> t found."
    - "Targeted implementation grep found only generic FCNC prose/comment hits at quarkConstraints/PAPER_0710_1869.md:35 and tests/test_paper_couplings.py:258, not an observable implementation."
    - "quarkConstraints/modern/phenomenology.py:23 enumerates only epsilon_K, K, B_d, B_s, and D0 in the modern quark policy surface."
    - "quarkConstraints/modern/phenomenology.py:167 says the modern surface is policy-only and does not define a numeric EFT backend."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
    - 'rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
    - 'rg -n "t.?->.?u.?g|t.?->.?g.?u|tug|utg|u.?g.?->.?t|tqg|uG|gtu|FCNC|flavou?r-changing|flavor changing" quarkConstraints/ qcd/ flavorConstraints/ neutrinos/ yukawa/ warpConfig/ solvers/ scanParams/ tests/ -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "Limit cataloging is MEDIUM, but production-grade integration is HIGH because the repo lacks a top chromomagnetic FCNC operator convention, RS-to-SMEFT matching, t -> u g width and u g -> t production normalization, collider/PDF reinterpretation machinery, and QCD-running choices for this operator."
open_issues:
  - "WA/CA should decide whether to use the numerically stronger older CMS B(t -> u g) < 2.0e-5 comparison as a prominent cross-check or keep the current PDG/pdgLive ATLAS Run-2 entry as the headline because it uses the latest 13 TeV single-top dataset and SMEFT convention."
  - "The ATLAS result is quoted for a left-handed SMEFT C_uG interpretation; a live RS implementation needs a convention for chiral chromomagnetic coefficients and correlated operators."
