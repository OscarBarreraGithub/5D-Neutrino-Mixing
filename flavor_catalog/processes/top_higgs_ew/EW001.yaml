implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "A live EW001 constraint needs a new electroweak precision likelihood plus RS matching from gauge/fermion KK spectra to vacuum-polarization self energies or SMEFT bosonic operators. This is outside the existing Delta F = 2 basis and requires new electroweak mode/matching calculations and correlated global-fit handling."
open_issues:
  - "WA/checker should decide whether the production catalog wants a PDG-only default likelihood or an optional CDF-W-mass scenario flag."
