    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "Z.?->.?mu.?tau|Z.?->.?tau.?mu|Z.?to.?mu.?tau|Z.?to.?tau.?mu|Zmutau|ZMuTau|mu.?tau.*Z|tau.?mu.*Z|lepton.?flavou?r.*Z|LFV.*Z" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "The repo lacks LFV Z operators and lepton-sector electroweak matching; production use would need a new Z_mu_tau coupling convention, left/right operator mapping, RS gauge/mass mixing inputs, and a combination policy with tau LFV and Higgs LFV constraints."
open_issues:
  - "CA should verify whether the next PDG listing keeps the ATLAS 6.5e-6 observed limit or incorporates CMS 2025 only as a weaker cross-check."
  - "A live scan implementation needs a convention for left- and right-handed off-diagonal Z_mu_tau couplings and their correlation with tau LFV observables."
