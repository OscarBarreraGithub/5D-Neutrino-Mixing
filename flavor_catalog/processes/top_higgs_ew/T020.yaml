code_coverage:
  status: "NO"
  evidence:
    - "Targeted grep for h -> e mu / H -> e mu / Y_e_mu / Y_mu_e across the required code directories returned no hits."
    - "The existing charged-lepton LFV implementation is mu -> e gamma only: flavorConstraints/muToEGamma.py:1 and flavorConstraints/muToEGamma.py:75."
    - "The scan applies the mu -> e gamma LFV filter at scanParams/scan.py:523 and scanParams/scan.py:524; no h -> e mu branch or Higgs LFV limit is present."
    - "Charged-lepton Yukawa support is a diagonal mass-relation helper at yukawa/charged_lepton.py:1 and yukawa/charged_lepton.py:36, not a Higgs LFV observable."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "b.?->.?s|X_s|K\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|H.?->|higgs|Higgs|LFV|lepton.?flavou?r|EDM|dipole|conversion|tau.?->|mu.?->.?3e" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints flavorConstraints scanParams tests -g "!*.ipynb"'
    - 'rg -n "h\\s*[-=]>\\s*e\\s*mu|H\\s*[-=]>\\s*e\\s*mu|Higgs.*e\\s*mu|LFV.*Higgs|Higgs.*LFV|Y_e_mu|Y_mu_e|Yemu|emu" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "The direct experimental limit is simple to catalog, but production-grade RS integration needs a new charged-lepton Higgs-Yukawa misalignment calculation, a convention for Y_e_mu/Y_mu_e and their relation to B(h -> e mu), and a Higgs production/total-width interpretation. The current code only has diagonal charged-lepton Yukawas and a mu -> e gamma dipole filter."
open_issues:
  - "WA/CA should decide whether to present only the PDG-rounded ATLAS value 6.2e-5 or also note the ATLAS arXiv abstract value 6.1e-5."
  - "A live scan implementation must define how RS lepton-sector parameters map to off-diagonal physical Higgs Yukawa couplings and whether non-SM Higgs production or total-width changes are allowed."
