#        separate chiral ownership.")
#   - flavor_catalog/signoff/round_003_index.md
#       (T011 listed alongside T013/L021/L022/L024/L025 as DEFERRED-SCOPE)
#
# This file exists so that a tool walking the plan-row -> file mapping does
# not see an unaccounted T011. It carries no physics content of its own;
# all observables, SM predictions, current measurements, RS implications,
# references, and provenance live in T010.{yaml,tex}.
# ---------------------------------------------------------------------------

