implementation_difficulty_reason: >
  A rigorous RS prediction for Z b_L b_L and Z b_R b_R shifts requires the
  electroweak KK/Z/Z' spectrum, custodial representations, fermion embeddings,
  brane kinetic terms, and Z-mixing data. The live constraint therefore uses a
  documented Zbb-shift proxy and flags the matching as NEEDS-HUMAN-PHYSICS.
