implementation_difficulty_rationale: "MEDIUM to store the external upper limit, but HIGH for production-grade RS integration because the repo lacks electroweak top-FCNC matching, a tcZ decay-width/production interpretation, and top-sector flavor-rotation plumbing."
open_issues:
  - "A future WA/CA should decide whether to quote the left-handed or right-handed ATLAS tensor benchmark as the single headline limit, or keep both."
  - "A live implementation needs an RS-to-SMEFT/tcZ convention choice before numerical scans can use this limit."
