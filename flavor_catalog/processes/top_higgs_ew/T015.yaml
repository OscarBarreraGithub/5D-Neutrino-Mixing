code_coverage:
  status: "NO"
  evidence:
    - "Targeted grep for Z -> e mu / Z -> mu e / Zemu / ZeMu / LFV Z strings across required code directories returned no hits."
    - "The only charged-lepton LFV implementation found is mu -> e gamma: flavorConstraints/muToEGamma.py:75."
    - "The scan calls the mu -> e gamma LFV filter at scanParams/scan.py:524."
    - "The modern phenomenology policy surface is limited to epsilon_K, K, B_d, B_s, and D0: quarkConstraints/modern/phenomenology.py:23."
  grep_commands:
    - 'rg -n "epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
