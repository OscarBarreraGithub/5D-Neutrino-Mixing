    - 'rg -n "MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
    - 'rg -n "Z.?->.?e.?mu|Z.?->.?mu.?e|Z.?to.?e.?mu|Z.?to.?mu.?e|Zemu|ZeMu|e.?mu.*Z|mu.?e.*Z|lepton.?flavou?r.*Z|LFV.*Z" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g "!*.ipynb"'
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_rationale: "MEDIUM to store the external branching-ratio upper limit, but HIGH for production-grade RS integration because the repo lacks LFV Z-coupling operators, electroweak/lepton-sector matching, and a policy for combining direct Z-pole and low-energy mu-to-e constraints."
open_issues:
  - "CA should verify whether the next PDG listing has incorporated CMS 2025; until then the sidecar keeps CMS 2025 as experiment-equivalent headline and PDG 2025 as official listing snapshot."
  - "A live scan implementation needs a convention for left/right off-diagonal Z e mu couplings and their correlation with low-energy mu-flavor observables."
