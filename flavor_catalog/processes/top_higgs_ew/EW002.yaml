  status: "PARTIAL"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  evidence:
    - "quarkConstraints/scan.py:42 documents PDG-derived per-element CKM tolerances."
    - "quarkConstraints/scan.py:247 defines the reduced CKM scan labels as Vus, Vcb, Vub, and J."
    - "quarkConstraints/fit.py:47 implements the reduced CKM observable set used for fits."
    - "quarkConstraints/fit.py:267 computes CKM residuals against target observables."
    - "quarkConstraints/modern/inputs.py:631 stores a frozen modern default CKM target."
    - "tests/test_quark_fit.py:575 anchors the target CKM convention against PDG 2024."
  missing:
    - "No Vud, superallowed-beta, neutron/pion beta, K_l3/f_+(0), K_mu2/f_K/f_pi, or Delta_CKM likelihood/check was found."
    - "Existing CKM code uses a unitary target as a fit/gating input; it does not implement first-row unitarity as an independent charged-current constraint."
  grep_commands:
    - "rg -n \"Vud|V_us|Vus|V_ub|Vub|CKM|Cabibbo|unitarity|Delta_CKM|DeltaCKM|Wolfenstein|lambda|K.?l3|superallowed|beta decay|Ft|f_\\\\+\\\\(0\\\\)|fK|f_pi\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e|CKM|Cabibbo|Vus|Vud\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma|CKM|Cabibbo|Vus|Vud\" quarkConstraints flavorConstraints scanParams tests docs -g '!*.ipynb'"
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "A live EW002 constraint requires new charged-current SMEFT or direct RS W-quark matching, optional G_F-shift handling for lepton-sector variants, and a correlated beta/kaon/lattice/radiative-correction likelihood. The existing Delta F = 2 basis and CKM fit gate do not cover this observable."
open_issues:
  - "WA/checker should decide whether the headline catalog value should be PDG's conservative 0.9983(7) sum or FLAG's sharper K_l3 plus beta-decay 0.99802(66) comparison."
