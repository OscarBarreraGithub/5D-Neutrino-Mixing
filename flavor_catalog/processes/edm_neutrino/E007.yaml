  commands:
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests -g '!*.ipynb'"
    - "rg -n \"Ra|radium|225Ra|d_Ra|dRa|Xe|xenon|129Xe|d_Xe|dXe|Schiff|octupole|diamagnetic|atomic EDM|chromo[- ]?EDM|CEDM|Weinberg|CP[- ]odd|electric dipole|EDM|dipole\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
  findings:
    - "Focused Ra/Xe/radium/xenon/Schiff/diamagnetic EDM grep over required implementation and test directories found no 225Ra or 129Xe EDM implementation."
    - "Generic EDM/dipole grep found only the off-diagonal mu->e gamma dipole helper, not an atomic or hadronic EDM calculation."
    - "flavorConstraints/muToEGamma.py:3 describes an off-diagonal LFV dipole constraint."
    - "flavorConstraints/muToEGamma.py:21 cites the Perez-Randall mu->e gamma dipole operator."
    - "flavorConstraints/muToEGamma.py:81 implements check_mu_to_e_gamma, not d_Ra or d_Xe."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires new CP-odd quark/gluon and semileptonic operator matching, RG evolution through QCD thresholds, and separate nuclear/atomic response models for Ra and Xe Schiff-moment dominated observables. Existing Delta F=2 and mu->e gamma code paths do not provide this observable."
open_issues:
  - "CA should verify whether a current PDG Review text table includes standalone 225Ra or 129Xe atom-EDM rows; the PKA found experiment-paper values instead."
  - "If promoted to live code, the PI must specify the CP-odd low-energy operator basis and acceptable nuclear/atomic Schiff-moment inputs for Ra and Xe."
  - "Coordinate with E004, E006, E008, and E009 to avoid double-counting neutron, Hg, chromo-EDM, and Weinberg-operator translations as independent measurements."
