  findings:
    - "Focused Weinberg/neutron-EDM/CP-odd-gluon grep over the required implementation/test directories returned exit=1, no matches."
    - "Generic EDM/dipole grep found only the unrelated off-diagonal mu->e gamma dipole helper and Delta F=2/QCD-running vocabulary."
    - "flavorConstraints/muToEGamma.py:3 describes an off-diagonal LFV dipole operator."
    - "flavorConstraints/muToEGamma.py:21 cites the Perez-Randall mu->e gamma dipole operator."
    - "flavorConstraints/muToEGamma.py:81 implements check_mu_to_e_gamma, not a hadronic EDM or Weinberg-operator constraint."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires new CP-odd colored-sector operators, RS loop or heavy-threshold matching, QCD running and operator mixing, and a hadronic matrix-element convention. Existing Delta F=2 and mu->e gamma code paths do not provide this observable."
open_issues:
  - "The benchmark bounds on w and C_6 are central, one-source-at-a-time translations from the neutron EDM limit, not correlated global EDM-fit intervals."
  - "WA/CA should decide which Weinberg-operator normalization to privilege in final prose, or whether to present both Pospelov-Ritz and Haisch-Hala conventions."
  - "A live implementation would need a PI choice for theta/Peccei-Quinn treatment, operator basis, RG thresholds, and hadronic matrix-element defaults."
