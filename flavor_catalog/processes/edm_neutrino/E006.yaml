  findings:
    - "Focused Hg/mercury/Schiff/diamagnetic EDM grep over the required implementation/test directories found no 199Hg EDM implementation."
    - "Generic EDM/dipole grep found only the off-diagonal mu->e gamma dipole helper, not a diamagnetic atom or hadronic EDM calculation."
    - "flavorConstraints/muToEGamma.py:3 describes an off-diagonal LFV dipole constraint."
    - "flavorConstraints/muToEGamma.py:21 cites the Perez-Randall mu->e gamma dipole operator."
    - "flavorConstraints/muToEGamma.py:81 implements check_mu_to_e_gamma, not d_Hg."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires new CP-odd quark/gluon and semileptonic operator matching, QCD running and thresholds, and atomic/nuclear translation for the 199Hg Schiff-moment dominated response. Existing Delta F=2 and mu->e gamma code paths do not provide this observable."
open_issues:
  - "WA/CA should verify the signed central value against the PRL 119, 119901 erratum before quoting the sign; the absolute 95% CL limit is unaffected."
  - "If promoted to live code, the PI must specify the CP-odd low-energy operator basis and which atomic/nuclear Schiff-moment inputs are acceptable."
  - "Coordinate with E004, E008, and E009 so neutron/proton/chromo-EDM/Weinberg translations are not double-counted as independent experimental measurements."
