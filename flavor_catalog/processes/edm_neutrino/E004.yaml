implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires new CP-odd quark EDM, chromo-EDM, and Weinberg-operator matching, QCD running and threshold treatment, and neutron hadronic matrix elements. Existing Delta F=2 and mu->e gamma code paths do not provide this observable."
