  findings:
    - "Focused neutron-EDM/CEDM/Weinberg implementation grep over the required implementation/test directories returned exit=1, no matches."
    - "Generic EDM/dipole grep found only the off-diagonal mu->e gamma dipole helper, not a hadronic neutron EDM constraint."
    - "flavorConstraints/muToEGamma.py:3 describes an off-diagonal LFV dipole operator."
    - "flavorConstraints/muToEGamma.py:21 cites the Perez-Randall mu->e gamma dipole operator."
    - "flavorConstraints/muToEGamma.py:81 implements check_mu_to_e_gamma, not d_n."
