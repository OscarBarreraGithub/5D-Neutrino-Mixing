code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  commands:
    - "rg -n \"quark.?chromo|chromo.?EDM|CEDM|cEDM|chromoelectric|Weinberg|neutron.?EDM|mercury.?EDM|Hg.?EDM|199Hg|electric dipole moment\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd warpConfig solvers tests -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd warpConfig solvers tests -g '!*.ipynb'"
  findings:
    - "Focused qCEDM/neutron-EDM/mercury-EDM/Weinberg grep over the required implementation/test directories returned exit=1, no matches."
    - "Generic EDM/dipole grep found only the off-diagonal mu->e gamma dipole helper and unrelated QCD/Delta F=2 running vocabulary."
    - "flavorConstraints/muToEGamma.py:3 describes an off-diagonal LFV dipole operator."
    - "flavorConstraints/muToEGamma.py:21 cites the Perez-Randall mu->e gamma dipole operator."
    - "flavorConstraints/muToEGamma.py:81 implements check_mu_to_e_gamma, not qCEDM or hadronic EDMs."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires new CP-odd quark EDM/qCEDM operators, RS loop matching, QCD running and threshold mixing, and hadronic/nuclear matrix-element choices. Existing Delta F=2 and mu->e gamma code paths do not provide this observable."
open_issues:
  - "The quoted qCEDM limits are central one-source-at-a-time translations, not a global EDM fit. WA/CA should decide whether to present them as bounds, benchmarks, or only EFT translation examples."
  - "A live implementation would need a PI choice of low-energy CP-odd basis, Peccei-Quinn/theta treatment, and hadronic/nuclear matrix-element defaults."
