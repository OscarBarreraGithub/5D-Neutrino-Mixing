code_coverage:
  status: "NO"
  searched_paths:
    - quarkConstraints
    - qcd
    - flavorConstraints
    - neutrinos
    - yukawa
    - warpConfig
    - solvers
    - scanParams
    - tests
  commands:
    - "rg -n \"electron.?EDM|eEDM|electric dipole|EDM|electron.*dipole|d_e\\b|\\bde\\s*=|C_e[[:alnum:]_]*EDM\" quarkConstraints qcd flavorConstraints neutrinos yukawa warpConfig solvers scanParams tests -g '!*.ipynb'"
    - "rg -n \"epsilon_K|epsilon_k|Delta m_K|DELTA_M_K|evaluate_delta_mk|B_d|b_d|B_s|b_s|D0|d_mix|mu.?e.?gamma|muToEGamma|BR_LIMIT|MEG\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"b.?->.?s|X_s|K\\\\*|R_K|R_D|B_s.*mu|pi.*nu|nu.*nubar|epsilon.?prime|eps.?prime|t.?->|Z.?->|h.?->|EDM|dipole|conversion|tau.?->|mu.?->.?3e\" quarkConstraints flavorConstraints scanParams neutrinos yukawa qcd scripts tests docs -g '!*.ipynb'"
    - "rg -n \"MODERN_PHENOMENOLOGY_SYSTEM_IDS|DEFAULT_DELTA_F2_INPUTS|evaluate_bd_mixing|evaluate_bs_mixing|evaluate_d0_mixing|check_mu_to_e_gamma\" quarkConstraints flavorConstraints scanParams tests docs -g '!*.ipynb'"
  findings:
    - "Focused electron-EDM implementation grep over the required implementation/test directories returned exit=1, no matches."
    - "flavorConstraints/muToEGamma.py:1 and flavorConstraints/muToEGamma.py:81 implement mu->e gamma, not flavor-diagonal electron EDM."
    - "flavorConstraints/muToEGamma.py:3 and flavorConstraints/muToEGamma.py:20 describe an off-diagonal LFV dipole operator bound."
    - "scanParams/scan.py:32 records a MEG II mu->e gamma branching-fraction bound, not an electron EDM constraint."
implementation_difficulty: "HIGH"
implementation_difficulty_if_missing: "HIGH"
implementation_difficulty_reason: "Requires a new flavor-diagonal CP-odd lepton dipole observable, model-to-Wilson matching in the lepton/KK sector, and likely SMEFT/LEFT running. Existing Delta F=2 and mu->e gamma utilities do not provide d_e."
open_issues:
  - "WA/CA should decide whether to describe the paramagnetic-molecule constraint purely as d_e or to mention correlated semileptonic CP-odd electron-nucleon operators in a shared EDM caveat."
  - "If promoted to live code, the PI must specify the lepton-sector matching assumptions and whether EDMs are hard constraints or contextual diagnostics."
