priority_rationale_short: "Direct h -> mu tau tests LFV Yukawa misalignment"
priority_rationale_full: |
  The h -> mu tau bound directly constrains charged-lepton Higgs-Yukawa misalignment, which is a natural handle in warped or partially composite lepton sectors. Rare-tau and dipole limits constrain related products, but the direct Higgs search is comparatively model-independent for this final state. The current 10^-3-level branching-fraction reach is meaningful but not comparable to the strongest muon-LFV anchors.
