priority_rationale_short: "Useful semileptonic bound, limited by long-distance K_L physics"
priority_rationale_full: |
  K_L -> mu+ mu- constrains large short-distance s -> d mu mu effects through a
  conservative dispersive allowance. The observed total rate is almost saturated
  by long-distance two-photon physics, so the RS interpretation is not a clean
  Wilson-coefficient bound. It is useful as a cross-check on large vector,
  axial, scalar, or pseudoscalar semileptonic effects but is not a leading
  anarchic-RS constraint.
