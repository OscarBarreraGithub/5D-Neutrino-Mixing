priority_rationale_full: |
  The Z -> e mu bound is a clean direct collider limit on an off-diagonal electroweak lepton coupling. It matters for lepton-bulk or partially composite lepton extensions because it tests a different observable than dipole searches. The global e-mu LFV constraint is usually dominated by mu -> e gamma, mu -> 3e, and mu-to-e conversion, so this is MEDIUM rather than HIGH.
