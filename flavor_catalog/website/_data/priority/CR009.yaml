priority_rationale_full: |
  High-mass Drell-Yan contact limits quote Lambda values up to about 35.8
  TeV, but the RS mass translation scales with light-quark and lepton
  couplings and with EFT validity. It can matter for non-universal or
  lepton-coupled neutral vectors, yet it is not a universal 35.8 TeV RS
  resonance limit. The result is meaningful but model-dependent.
