priority_rationale_short: "Hg EDM is powerful but nuclear-translation limited."
priority_rationale_full: |
  The mercury atom EDM gives a stringent null test of CP-odd hadronic and
  semileptonic sources, especially isovector combinations. It is
  complementary to neutron EDM and qCEDM constraints, but translating it to
  RS parameters depends on Schiff moments, nuclear and atomic matrix
  elements, and possible cancellations. That makes it meaningful but
  subleading to the cleanest EDM anchors.
