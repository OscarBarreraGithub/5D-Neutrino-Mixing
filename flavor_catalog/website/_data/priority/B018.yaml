priority_rationale_short: "Clean LFU null test for lepton-nonuniversal b->s effects"
priority_rationale_full: |
  R_K is a clean semileptonic LFU ratio with strong cancellation of hadronic uncertainties. It directly tests lepton-nonuniversal b-s electroweak effects that can arise from nonuniversal localization or extra neutral-current couplings. Current measurements are close to the SM and the ratio is blind to universal shifts, so it is a subleading but valuable constraint.
