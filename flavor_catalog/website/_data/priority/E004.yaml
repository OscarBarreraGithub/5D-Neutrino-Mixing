priority_rationale_short: "Neutron EDM anchors hadronic CP-dipole constraints."
priority_rationale_full: |
  The neutron EDM bound at 1.8e-26 e cm probes quark EDMs, qCEDMs,
  theta-like sources, and Weinberg-operator contributions. New anarchic CP
  phases in warped or composite sectors feed these operators directly.
  Although translation to RS parameters has hadronic uncertainties, this is
  a canonical dominant CP constraint.
