priority_rationale_short: "Precise charged-current test, but global-fit dependent"
priority_rationale_full: |
  First-row CKM unitarity is a high-precision charged-current consistency test and is relevant for RS shifts in W couplings, vector-like quark mixing, or the inferred G_F. It is clean enough to matter in a combined electroweak/flavor scan. It is still not a dominant anarchic-RS exclusion by itself because the interpretation is global-fit dependent and can be distributed among semileptonic currents, muon decay, right-handed W couplings, and correlated Z or Delta F = 2 effects.
