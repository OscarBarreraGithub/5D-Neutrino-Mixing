priority_rationale_short: "Secondary neutral LFV semileptonic cap, dominated by stronger LFV modes"
priority_rationale_full: |
  K_L -> pi0 e mu is a clean semileptonic LFV upper limit and probes products of
  off-diagonal quark and lepton couplings in lepton-extended RS models. Its
  bound is weaker and more auxiliary than K_L -> e mu and the charged-kaon LFV
  companion modes. It is best treated as a correlation and consistency check
  once a semileptonic LFV operator basis is present.
