priority_rationale_short: "K_S dimuon upper limit, useful only for large NP enhancements"
priority_rationale_full: |
  K_S -> mu+ mu- can test s -> d mu mu neutral currents and scalar or
  pseudoscalar lepton operators in nonminimal warped models. The current limit
  is still well above the Standard Model scale and the interpretation is
  operator-dependent because long-distance and short-distance pieces are not a
  single clean object. It is a complementary cap on large enhancements, not a
  leading canonical anarchic-RS constraint.
