constraint_priority: MEDIUM
priority_rationale_short: "Clean charged-kaon LFV limits, model-dependent but nontrivial"
priority_rationale_full: |
  K+ -> pi+ e mu modes are clean null tests of semileptonic lepton-flavor
  violation at the 10^-11 level. In RS models with bulk leptons or related
  lepton-flavor spurions they constrain vector, scalar, or tensor
  quark-lepton operators that are not covered by the Delta F=2 kaon lane. They
  remain MEDIUM because the mapping is model-dependent and purely leptonic LFV
  observables often dominate specific lepton-sector choices.
