priority_rationale_short: "Real-part K mixing bound, but long-distance limited"
priority_rationale_full: |
  Delta m_K probes the real part of the same RS Delta S=2 operator set that
  makes epsilon_K dangerous, including chirally enhanced left-right structures.
  It is therefore a meaningful conservative magnitude bound on KK-gluon flavor
  violation. Its constraining power is downgraded because the measured splitting
  contains large long-distance Standard Model contributions and K001 dominates
  the generic complex-phase scan.
