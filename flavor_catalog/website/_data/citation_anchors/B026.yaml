        L4: og:title: Measurement of the branching ratio of $\bar{B} \to D^{(\ast)} τ^- \barν_τ$ relative to $\bar{B} \to D^{(\ast)} \ell^- \barν_\ell$ decays with hadronic tagging at Belle
        L5: og:url: https://arxiv.org/abs/1507.03233v3
        L6: og:description: We report a measurement of the branching fraction ratios R(D(*)) of Bbar -&gt; D(*) tau- nubar_tau relative to Bbar -&gt; D()* l- nubar_l (where l = e or mu) using the full Belle data sample of 772 x 10^6 BBbar pairs collected at the Y(4S) resonance with the Belle detector at the KEKB asymmetric-energy e+e- collider. The measured values are R(D)= 0.375 +- 0.064(stat.) +- 0.026(syst.) and R(D*) = 0.293 +- 0.038(stat.) +- 0.015(syst.). The analysis uses hadronic reconstruction of the tag-side B meson and purely leptonic tau decays. The results are consistent with earlier measurements and do not show a significant deviation from the standard model prediction.
