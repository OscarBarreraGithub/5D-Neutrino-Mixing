        L3: html_title: [2406.03387] Measurement of the branching fraction ratios $R(D^{+})$ and $R(D^{*+})$ using muonic $τ$ decays
        L4: og:title: Measurement of the branching fraction ratios $R(D^{+})$ and $R(D^{*+})$ using muonic $τ$ decays
        L5: og:url: https://arxiv.org/abs/2406.03387v2
        L6: og:description: The branching fraction ratios of $\overline{B}^0\to D^+τ^-\overlineν_τ$ and $\overline{B}^0\to D^{*+}τ^-\overlineν_τ$ decays are measured with respect to their muonic counterparts, using a data sample corresponding to an integrated luminosity of 2.0 fb$^{-1}$ collected by the LHCb experiment in proton-proton collisions at $\sqrt{s} = 13$ TeV. The reconstructed final states are formed by combining $D^+$ mesons with $τ^-\toμ^-\overlineν_μν_τ$ candidates, where the $D^+$ is reconstructed via the $D^+\to K^-π^+π^+$ decay. The results are \begin{align*} R(D^{+}) &amp;= 0.249 \pm 0.043 \pm 0.047, R(D^{*+}) &amp;= 0.402 \pm 0.081\pm 0.085, \end{align*} where the first uncertainties are statistical and the second systematic. The two measurements have a correlation coefficient of $-0.39$ and are compatible with the Standard Model.
        L7: citation_title: Measurement of the branching fraction ratios $R(D^{+})$ and $R(D^{*+})$ using muonic $\tau$ decays
        L8: citation_doi: 10.1103/PhysRevLett.134.061801
        L9: citation_date: 2024/06/05
    - line_number: 12
