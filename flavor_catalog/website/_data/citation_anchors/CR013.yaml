    matches:
    - line_number: 595
      context: "L592: \t</tr>\nL593:\nL594: \t<tr><td colspan=1 class=\"textline\">\nL595: <!-- _SUMMARY_ -->A search has\
        \ been performed for new physics in high-mass diphoton events from proton-proton collisions at a center-of-mass energy\
        \ of 13 TeV. The data used correspond to an integrated luminosity of 138 fb$ ^{-1} $ collected with the CMS detector\
        \ in 2016-2018. No statistically significant excess, either resonant or nonresonant, is observed in the spectra. Masses\
        \ below 2.2 to 5.6 TeV are excluded at the 95% confidence level for the excited state of the Randall-Sundrum (RS)\
        \ graviton, for coupling parameters between 0.01 $ < \\tilde{k} < $ 0.2. Limits are also set on the production of\
        \ scalar Higgs boson like resonances. In the model with large extra spatial dimensions by Arkani-Hamed, Dimopoulos,\
        \ and Dvali (ADD), exclusion limits on the mass scale $ M_{\\mathrm{S}} $ range between 7.1 to 11.1 TeV, depending\
        \ on the specific convention. Additionally, exclusion limits are set in the two-dimensional space of the continuum\
        \ clockwork model, with the fundamental scale $ M_{5} $ excluded at the 95% confidence level below 8.0 TeV for $ k\
        \ $ values between 0.2 GeV and 2.0 TeV. The present results are the strongest limits to date on ADD extra dimensions\
        \ and RS gravitons with $ \\tilde{k} \\ge $ 0.1.\nL596: \t</td></tr>\nL597:\nL598:       </table>"
