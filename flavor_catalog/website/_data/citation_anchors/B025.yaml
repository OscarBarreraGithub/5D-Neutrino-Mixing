    status: RESOLVED
    matches:
    - line_number: 16
      context: |
        L13:     <updated>2015-10-10T21:01:28Z</updated>
        L14:     <link href="https://arxiv.org/abs/1507.03233v3" rel="alternate" type="text/html"/>
        L15:     <link href="https://arxiv.org/pdf/1507.03233v3" rel="related" type="application/pdf" title="pdf"/>
        L16:     <summary>We report a measurement of the branching fraction ratios R(D(*)) of Bbar -&gt; D(*) tau- nubar_tau relative to Bbar -&gt; D()* l- nubar_l (where l = e or mu) using the full Belle data sample of 772 x 10^6 BBbar pairs collected at the Y(4S) resonance with the Belle detector at the KEKB asymmetric-energy e+e- collider. The measured values are R(D)= 0.375 +- 0.064(stat.) +- 0.026(syst.) and R(D*) = 0.293 +- 0.038(stat.) +- 0.015(syst.). The analysis uses hadronic reconstruction of the tag-side B meson and purely leptonic tau decays. The results are consistent with earlier measurements and do not show a significant deviation from the standard model prediction.</summary>
        L17:     <category term="hep-ex" scheme="http://arxiv.org/schemas/atom"/>
        L18:     <published>2015-07-12T13:34:21Z</published>
        L19:     <arxiv:comment>Accepted for publication in Phys.Rev.D</arxiv:comment>
- block_key: selected_experimental_inputs[3]
  source_url: null
  snapshot_path: flavor_catalog/references/B025/belle2019_arxiv1910_05864.txt
  sha256: sha256:a228175d16e08c7964819773f77bdd1f627480ec990934d3386ea4ab9113a6d7
  access_date: null
  anchors:
  - anchor_field: fallback_value_uncertainty
    anchor_string: belle2019_arxiv1910_05864 = 0.307 +- 0.037
    status: RESOLVED
    matches:
    - line_number: 16
      context: |
        L13:     <updated>2019-10-16T23:13:56Z</updated>
        L14:     <link href="https://arxiv.org/abs/1910.05864v2" rel="alternate" type="text/html"/>
        L15:     <link href="https://arxiv.org/pdf/1910.05864v2" rel="related" type="application/pdf" title="pdf"/>
        L16:     <summary>The experimental results on the ratios of branching fractions $\mathcal{R}(D) = {\cal B}(\bar{B} \to D П„^- \barОЅ_П„)/{\cal B}(\bar{B} \to D \ell^- \barОЅ_{\ell})$ and $\mathcal{R}(D^*) = {\cal B}(\bar{B} \to D^* П„^- \barОЅ_П„)/{\cal B}(\bar{B} \to D^* \ell^- \barОЅ_{\ell})$, where $\ell$ denotes an electron or a muon, show a long-standing discrepancy with the Standard Model predictions, and might hint to a violation of lepton flavor universality. We report a new simultaneous measurement of $\mathcal{R}(D)$ and $\mathcal{R}(D^*)$, based on a data sample containing $772 \times 10^6$ $B\bar{B}$ events recorded at the $ОҐ(4S)$ resonance with the Belle detector at the KEKB $e^+ e^-$ collider. In this analysis the tag-side $B$ meson is reconstructed in a semileptonic decay mode and the signal-side $П„$ is reconstructed in a purely leptonic decay. The measured values are $\mathcal{R}(D)= 0.307 \pm 0.037 \pm 0.016$ and $\mathcal{R}(D^*) = 0.283 \pm 0.018 \pm 0.014$, where the first uncertainties are statistical and the second are systematic. These results are in agreement with the Standard Model predictions within $0.2$, $1.1$ and $0.8$ standard deviations for $\mathcal{R}(D)$, $\mathcal{R}(D^*)$ and their combination, respectively. This work constitutes the most precise measurements of $\mathcal{R}(D)$ and $\mathcal{R}(D^*)$ performed to date as well as the first result for $\mathcal{R}(D)$ based on a semileptonic tagging method.</summary>
        L17:     <category term="hep-ex" scheme="http://arxiv.org/schemas/atom"/>
        L18:     <published>2019-10-13T23:32:28Z</published>
        L19:     <arxiv:comment>8 pages, 1 figure, submitted to Physical Review Letters</arxiv:comment>
