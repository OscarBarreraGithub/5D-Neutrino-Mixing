        L14:     <link href="https://arxiv.org/abs/2302.02886v3" rel="alternate" type="text/html"/>
        L15:     <link href="https://arxiv.org/pdf/2302.02886v3" rel="related" type="application/pdf" title="pdf"/>
        L16:     <summary>The ratios of branching fractions $\mathcal{R}(D^{*})\equiv\mathcal{B}(\bar{B}\to D^{*}П„^{-}\barОЅ_П„)/\mathcal{B}(\bar{B}\to D^{*}Ој^{-}\barОЅ_Ој)$ and $\mathcal{R}(D^{0})\equiv\mathcal{B}(B^{-}\to D^{0}П„^{-}\barОЅ_П„)/\mathcal{B}(B^{-}\to D^{0}Ој^{-}\barОЅ_Ој)$ are measured, assuming isospin symmetry, using a sample of proton-proton collision data corresponding to 3.0 fb${ }^{-1}$ of integrated luminosity recorded by the LHCb experiment during 2011 and 2012. The tau lepton is identified in the decay mode $П„^{-}\toОј^{-}ОЅ_П„\barОЅ_Ој$. The measured values are $\mathcal{R}(D^{*})=0.281\pm0.018\pm0.024$ and $\mathcal{R}(D^{0})=0.441\pm0.060\pm0.066$, where the first uncertainty is statistical and the second is systematic. The correlation between these measurements is $ПЃ=-0.43$. Results are consistent with the current average of these quantities and are at a combined 1.9 standard deviations from the predictions based on lepton flavor universality in the Standard Model.</summary>
        L17:     <category term="hep-ex" scheme="http://arxiv.org/schemas/atom"/>
        L18:     <published>2023-02-06T15:53:08Z</published>
        L19:     <arxiv:comment>All figures and tables, along with any supplementary material and additional information, are available at https://cern.ch/lhcbproject/Publications/p/LHCb-PAPER-2022-039.html (LHCb public pages)</arxiv:comment>
