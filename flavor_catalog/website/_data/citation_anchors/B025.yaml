    anchor_string: belleii2025_arxiv2504_11220 = 0.418 +- 0.074
    status: RESOLVED
    matches:
    - line_number: 16
      context: |
        L13:     <updated>2026-03-19T13:30:49Z</updated>
        L14:     <link href="https://arxiv.org/abs/2504.11220v3" rel="alternate" type="text/html"/>
        L15:     <link href="https://arxiv.org/pdf/2504.11220v3" rel="related" type="application/pdf" title="pdf"/>
        L16:     <summary>We report measurements of the ratios of branching fractions ${\cal R}(D^{(*)+}) = \frac{{\cal B}(\overline{B}{}^0 \to D^{(*)+} \,П„^- \, \overlineОЅ_П„)}{{\cal B}(\overline{B}{}^0 \to D^{(*)+} \, \ell^- \, \overlineОЅ_\ell)}$, where $\ell$ denotes either an electron or a muon. These ratios test the universality of the charged-current weak interaction. The results are based on a $365\, \mathrm{fb}^{-1}$ data sample collected with the Belle II detector at the SuperKEKB $e^+e^-$ collider, which operates at a center-of-mass energy corresponding to the $ОҐ(4S)$ resonance, just above the threshold for $B\overline{B}{}$ production. Signal candidates are reconstructed by selecting events in which the companion $B$ meson from the $ОҐ(4S) \to B\overline{B}{}$ decay is identified in semileptonic modes. The $П„$ lepton is reconstructed via its leptonic decays. We obtain ${\cal R}(D^+) = 0.418 \pm 0.074 ~({\mathrm{stat}}) \pm 0.051 ~({\mathrm{syst}})$ and ${\cal R}(D^{*+}) = 0.306 \pm 0.034 ~({\mathrm{stat}}) \pm 0.018 ~({\mathrm{syst}})$, which are consistent with world average values. Accounting for the correlation between them, these values differ from the Standard Model expectation by a collective significance of $1.7$ standard deviations.</summary>
        L17:     <category term="hep-ex" scheme="http://arxiv.org/schemas/atom"/>
        L18:     <published>2025-04-15T14:22:58Z</published>
        L19:     <arxiv:primary_category term="hep-ex"/>
